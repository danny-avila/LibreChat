# Credential-free e2e config template. e2e/playwright.config.mock.ts copies this
# to an ignored runtime path; the in-process fake model (e2e/setup/fake-model.js)
# overrides each run, so the placeholder baseURL below is never contacted.
version: 1.3.11
cache: true

# Per-endpoint file upload config so both upload UXs get e2e coverage:
# - Mock Provider A keeps the legacy 3-way dropdown (chat.spec.ts exercises
#   "Upload to Provider"); legacyFileUploadUX also forces llmDeliveryPath
#   'provider', so that test's CSV still reaches the model.
# - Mock Provider B uses the unified single button with spreadsheet/csv routed
#   to llmDeliveryPath 'none' (unified-upload.spec.ts).
fileConfig:
  endpoints:
    'Mock Provider A':
      legacyFileUploadUX: true
    'Mock Provider B':
      defaultLLMDeliveryPath:
        overrides:
          'text/csv': 'none'
          'text/plain': 'none'
          'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': 'none'
          # Routed to the provider: still delivered to the model AND shown in chat.
          'text/markdown': 'provider'

endpoints:
  custom:
    - name: 'Mock Provider A'
      apiKey: 'e2e-mock-key-a'
      baseURL: 'http://127.0.0.1:8889/v1'
      models:
        default:
          - 'mock-model-a'
        fetch: false
      titleConvo: false
      modelDisplayLabel: 'Mock Provider A'

    - name: 'Mock Provider B'
      apiKey: 'e2e-mock-key-b'
      baseURL: 'http://127.0.0.1:8889/v1'
      models:
        default:
          - 'mock-model-b'
        fetch: false
      titleConvo: false
      modelDisplayLabel: 'Mock Provider B'

modelSpecs:
  list:
    - name: 'e2e-mock-provider-a'
      label: 'Mock Provider A'
      preset:
        endpoint: 'Mock Provider A'
        model: 'mock-model-a'

    - name: 'e2e-mock-provider-b'
      label: 'Mock Provider B'
      preset:
        endpoint: 'Mock Provider B'
        model: 'mock-model-b'

    - name: 'e2e-skill-scope'
      label: 'E2E Skill Scope'
      preset:
        endpoint: 'Mock Provider A'
        model: 'mock-model-a'
      skills:
        - 'e2e-model-spec-allowed'
        - 'e2e-model-spec-missing'
        - 'e2e-model-spec-inaccessible'
