# Jamun AI Configuration
# Based on LibreChat YAML specification

endpoints:
  custom:
    - name: "Jamun-Brain"
      # The Kaggle API URL provided via environment variable
      baseURL: "${KAGGLE_API_URL}"
      apiKey: "${KAGGLE_API_KEY}"
      models:
        default: ["jamun-brain-model"]
        fetch: true
      titleConvo: true
      titleModel: "current_model"
      # Bypass default filters and stop parameters
      dropParams: ["stop"]
      forcePrompt: true
      iconURL: "https://raw.githubusercontent.com/danny-avila/LibreChat/main/client/public/assets/logo.png" # Placeholder

# MCP Servers configuration for Google Drive integration
mcpServers:
  gdrive:
    type: "stdio"
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-gdrive"
    timeout: 300000 # 5 minutes
