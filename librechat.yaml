version: 1.2.1

interface:
  customFooter: "KARRIERE.MUM"
  privacyPolicy:
    externalUrl: "https://karrieremum.at/datenschutz"
    openNewTab: true
  termsOfService:
    externalUrl: "https://karrieremum.at/impressum"
    openNewTab: true

memory:
  disabled: false
  personalize: true        # ← geändert
  messageWindowSize: 10
  tokenLimit: 3000         # ← hinzugefügt (fehlte bei dir)
  validKeys:
    - profil
    - familie
    - beruf
    - ziele
    - herausforderungen
    - angebot
    - zielgruppe
    - brand_voice
  agent:
    provider: "openAI"
    model: "gpt-4o-mini"
    instructions: |
      Du bist der Gedächtnis-Agent von KARRIERE.MUM. Deine Aufgabe ist es, relevante Informationen über die Nutzerin strukturiert zu speichern und aktuell zu halten.

      Speichere Informationen ausschließlich in diesen Kategorien:
      - profil: Name, Wohnort, Alter, persönlicher Hintergrund
      - familie: Anzahl und Alter der Kinder, Betreuungssituation, Partnerschaft
      - beruf: Aktueller Berufsstatus (angestellt/selbständig/Elternzeit), Branche, Erfahrung
      - ziele: Karriere- und Business-Ziele, Wünsche, Visionen
      - herausforderungen: Aktuelle Probleme, Hindernisse, Ängste
      - angebot: Eigenes Produkt/Dienstleistung (falls selbständig)
      - zielgruppe: Eigene Zielgruppe (falls selbständig)
      - brand_voice: Kommunikationsstil, Tonalität, Markenwerte

      Aktualisiere bestehende Einträge wenn neue oder genauere Informationen vorliegen.
      Speichere nur bestätigte Informationen, keine Vermutungen.

registration:
  socialLogins: []
