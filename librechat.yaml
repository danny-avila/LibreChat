# Agent Actions domain restrictions (OpenAPI spec validation)
# SECURITY: If not configured, SSRF targets are blocked (localhost, private IPs, .internal/.local TLDs).
# Prefer `allowedAddresses` for permitting internal targets — adding a private IP to
# `allowedDomains` switches the field into strict-whitelist mode and blocks every
# public destination not also listed.
# Supports wildcards: '*.example.com' and protocol/port restrictions: 'https://api.example.com:8443'
actions:
  allowedDomains:
    - 'swapi.dev'
    - 'librechat.ai'
    - 'google.com'
    # - 'http://10.225.26.25:7894'  # Internal IP with protocol/port (uncomment if needed)
  # `allowedAddresses` is an SSRF exemption list, NOT a strict whitelist.
  # Hostname/IP + port pairs listed here bypass the default-deny block for that
  # one private/loopback/link-local service. Public domains continue to work
  # normally — listing private targets here does not restrict access to anything else.
  #
  # Entries must include a port: `host:port`, `private.ip:port`, or `[ipv6]:port`.
  # Do not use URLs, paths, CIDR ranges, bare hosts/IPs, or public IP literals.
  # Public IP literals are rejected at config load (the field is scoped to
  # private IP space; public IPs aren't SSRF targets).
  #
  # NOTE on hostnames: a hostname entry trusts whatever IP that name resolves to
  # on the listed port. If DNS for that name is hijacked or rotated to a different
  # private IP, the exemption follows. Only list hostnames whose DNS you control.
  # Prefer literal IPs when you can.
  # allowedAddresses:
  #   - 'host.docker.internal:11434'
  #   - '127.0.0.1:11434'
  #   - '10.0.0.5:8080'

# Custom endpoint baseURL exemption list
# SECURITY: User-provided baseURLs (`baseURL: 'user_provided'`) are validated against
# the same SSRF block as Actions and MCP. If your users legitimately point at private
# services (self-hosted Ollama, internal LLM gateway, etc.), list those hostname/IP
# + port pairs here so the validator allows them through. Public destinations are
# unaffected.
#
# Entries must include a port: `host:port`, `private.ip:port`, or `[ipv6]:port`.
# Do not use URLs, paths, CIDR ranges, bare hosts/IPs, or public IP literals.
# Hostname entries trust whatever IP they resolve to on the listed port — only
# list names whose DNS you control.
# endpoints:
#   allowedAddresses:
#     - 'localhost:11434'
#     - '127.0.0.1:11434'
#     - 'ollama:11434'
#     - '10.0.0.5:8080'

# MCP Server domain restrictions for remote transports (SSE, WebSocket, HTTP)
# SECURITY: If not configured, SSRF targets are blocked (localhost, private IPs, .internal/.local TLDs).
# Prefer `allowedAddresses` for permitting internal targets — adding a private host to
# `allowedDomains` switches the field into strict-whitelist mode and blocks every
# public destination not also listed.
# Supports wildcards: '*.example.com' matches 'api.example.com', 'staging.example.com', etc.
# Supports protocol/port restrictions: 'https://api.example.com:8443' restricts to specific protocol/port.
# mcpSettings:
#   allowedDomains:
#     - 'host.docker.internal'    # Docker host access (required for Docker setups)
#     - 'localhost'               # Local development
#     - '*.example.com'           # Wildcard subdomain
#     - 'https://secure.api.com'  # Protocol-restricted
#     - 'http://internal:8080'    # Protocol and port restricted
#   # allowedAddresses is an SSRF exemption list (private-IP-space only).
#   # Hostname/IP + port pairs listed here bypass the default-deny block for that
#   # one private service; public destinations remain reachable. Useful when you
#   # want default SSRF protection AND specific internal MCP servers. Entries must
#   # include a port (`host:port`, `private.ip:port`, or `[ipv6]:port`) and must
#   # not be URLs, paths, CIDR ranges, bare hosts/IPs, or public IP literals.
#   # Hostname entries trust whatever IP they resolve to on the listed port.
#   allowedAddresses:
#     - 'host.docker.internal:8080'
#     - '127.0.0.1:8080'

# =============================================================================
# MCP Servers — document/file skills for AI Workforce Pro
# -----------------------------------------------------------------------------
# These run as stdio subprocesses of the LibreChat backend.
#
# RELIABILITY / DEPLOYMENT NOTES (read before production deploy):
#  1. `npx -y` downloads each package on first call. For a production legal tool,
#     PRE-INSTALL the Node servers in your Dockerfile so they are not fetched at
#     runtime, e.g.:
#       RUN npm install -g @modelcontextprotocol/server-filesystem \
#                          @modelcontextprotocol/server-pdf
#  2. The `excel` server is PYTHON-based under its npm wrapper. It will NOT launch
#     on a stock Node image. Add Python 3.8+ (and pip/uv) to your Dockerfile, or
#     remove this server. Verify its output-path config against its own docs.
#  3. Cloud Run's local filesystem is EPHEMERAL — files written under the path
#     below do not persist across instance recycles. Fine for generate-then-
#     download; nothing is durable. For persistence, mount GCS / a volume.
#  4. The `filesystem` server creates TEXT formats only (.md/.csv/.html/.txt).
#     It cannot author binary Office files. The `pdf` server is READ/EXTRACT only.
#  5. User-level MCP management stays OFF (no interface.mcpServers permissions),
#     so end users cannot add or modify servers — appropriate for a locked client.
# =============================================================================
mcpServers:

  # Official, Node-based. Read uploaded files; write text-based artifacts.
  #
  # PER-USER ISOLATION (security): each user gets their own subprocess jailed to
  # `/app/uploads/<their user id>`, so no user (or tenant) can read, list, or write
  # another user's files. Two settings make this work together:
  #   1. `startup: false` — excludes this server from the SHARED app-level connection
  #      pool. Without it, LibreChat would spawn ONE filesystem process rooted at the
  #      raw path and hand it to every user (see ConnectionsRepository
  #      `isAllowedToConnectToServer`), giving everyone a shared, unscoped root.
  #      With it, the connection is created lazily PER USER on first tool call.
  #   2. `{{LIBRECHAT_USER_ID}}` — resolved per user by `processMCPEnv` at connection
  #      time (only user-level connections carry a user, which is why (1) is required).
  # The `sh -c … mkdir -p … && exec …` wrapper pre-creates the per-user directory,
  # because @modelcontextprotocol/server-filesystem refuses to start if its root does
  # not already exist. `exec` hands stdio (the MCP transport) straight to the server.
  # The user id is a Mongo ObjectId (hex only); it is single-quoted defensively.
  #
  # NOTE: tools are discovered lazily per user (not at startup) — expected for
  # `startup: false` servers; the agent resolves them via the `filesystem_mcp_all`
  # wildcard on first use. Explicit cross-user/tenant sharing is intentionally NOT
  # provided here and must be designed separately.
  filesystem:
    type: stdio
    command: sh
    args:
      - "-c"
      - "mkdir -p '/app/uploads/{{LIBRECHAT_USER_ID}}' && exec npx -y @modelcontextprotocol/server-filesystem '/app/uploads/{{LIBRECHAT_USER_ID}}'"
    startup: false             # force per-user connections (no shared app-level root)
    timeout: 90000             # 90s — generous for first-run npx download

  # Purpose-built .xlsx generation (charts, formatting). MIT. PYTHON-based —
  # requires Python 3.8+ in the container (see note 2 above) or it will fail.
  excel:
    type: stdio
    command: npx
    args:
      - "-y"
      - "@guillehr2/excel-mcp-server@latest"
    timeout: 180000             # 180s — Python wrapper + first-run install is slow

  # AI Workforce Pro skills server (the ~45 SMB_Team skills). Tracked here so it
  # survives deploys — the deployed librechat.yaml is this repo copy (bind-mounted
  # + config-only fast deploy), so a server added only on the VM gets overwritten.
  # Auth: `apiKey:` (NOT `headers:`) so LibreChat uses static bearer auth and skips
  # OAuth metadata probing. The raw key lives in env (set SMBTEAM_MCP_API_KEY on the
  # VM / in .env — value is in LastPass 'AIWP backend (production)'); never commit it.
  smbteam-mcp:
    type: streamable-http
    url: https://mcp.smbteam.com/mcp
    apiKey:
      key: ${SMBTEAM_MCP_API_KEY}
      source: admin
      authorization_type: bearer
    timeout: 60000

  # Quo (formerly OpenPhone) business phone/SMS — call logs, texts, contacts.
  # Official remote MCP server; OAuth 2.1 with per-user browser sign-in and
  # automatic client registration (no manually-registered app/client_id needed,
  # unlike Asana). `startup: false` so it only connects once a user clicks
  # connect, same as the other OAuth-gated servers.
  quo:
    type: streamable-http
    url: https://mcp.quo.com/mcp
    startup: false
    chatMenu: true
    serverInstructions: "Use for Quo (business phone/SMS) call logs, texts, and contacts."

  # Note: PDF reading is handled via execute_code (Python pdfplumber/pymupdf).
  # @modelcontextprotocol/server-pdf is omitted — it requires pdfjs-dist as a
  # peer dep that npx does not install, causing a crash on every init.

# Example MCP Servers Object Structure (reference — see LibreChat docs)
# mcpServers:
#   everything:
#     # type: sse # type can optionally be omitted
#     url: http://localhost:3001/sse
#     # proxy: "${MCP_PROXY_URL}"  # optional outbound proxy (http/https/socks/socks5)
#     timeout: 60000  # 1 minute timeout for this server, this is the default timeout for MCP servers.
#   puppeteer:
#     type: stdio
#     command: npx
#     args:
#       - -y
#       - "@modelcontextprotocol/server-puppeteer"
#     timeout: 300000  # 5 minutes timeout for this server
#   filesystem:
#     # type: stdio
#     command: npx
#     args:
#       - -y
#       - "@modelcontextprotocol/server-filesystem"
#       - /home/user/LibreChat/
#     iconPath: /home/user/LibreChat/client/public/assets/logo.svg
#   mcp-obsidian:
#     command: npx
#     args:
#       - -y
#       - "mcp-obsidian"
#       - /path/to/obsidian/vault

# Definition of custom endpoints
endpoints:
  # assistants:
  #   disableBuilder: false # Disable Assistants Builder Interface by setting to `true`
  #   pollIntervalMs: 3000  # Polling interval for checking assistant updates
  #   timeoutMs: 180000  # Timeout for assistant operations
  #   # Should only be one or the other, either `supportedIds` or `excludedIds`
  #   supportedIds: ["asst_supportedAssistantId1", "asst_supportedAssistantId2"]
  #   # excludedIds: ["asst_excludedAssistantId"]
  #   # Only show assistants that the user created or that were created externally (e.g. in Assistants playground).
  #   # privateAssistants: false # Does not work with `supportedIds` or `excludedIds`
  #   # (optional) Models that support retrieval, will default to latest known OpenAI models that support the feature
  #   retrievalModels: ["gpt-4-turbo-preview"]
  #   # (optional) Assistant Capabilities available to all users. Omit the ones you wish to exclude. Defaults to list below.
  #   capabilities: ["code_interpreter", "retrieval", "actions", "tools", "image_vision"]
  agents:
    disableBuilder: true
    maxRecursionLimit: 25
    # `execute_code` routes Python to the self-hosted Code Interpreter service
    # (see deploy-compose.yml `code-interpreter` + LIBRECHAT_CODE_BASEURL in .env),
    # which returns generated files (xlsx/docx/pdf/pptx) as downloadable
    # attachments. `tools` keeps the MCP servers (excel, filesystem) available.
    capabilities:
      - execute_code
      - tools
      - actions
      - file_search
      - artifacts
      - context
      - ocr
      - skills

  anthropic:
    titleModel: claude-sonnet-4-6
    models:
      - claude-fable-5
      - claude-opus-4-8
      - claude-opus-4-7
      - claude-opus-4-6
      - claude-sonnet-4-6
      - claude-sonnet-4-5-20250929
      - claude-haiku-4-5-20251001
    # Enables Anthropic's native hosted web search (web_search_20250305).
    # getLLMConfig injects it directly into the request's tools array, so it
    # works in agent mode without a separate search provider or the
    # agents.capabilities web_search gate. Uses the existing ANTHROPIC_API_KEY.
    addParams:
      web_search: true

  # Native OpenAI — uses OPENAI_API_KEY. The GPT/o-series specs route here.
  # web_search enables OpenAI's hosted web search via the Responses API; getLLMConfig
  # adds the { type: 'web_search' } tool and forces useResponsesApi, which also yields
  # url_citation annotations (the favicon "Web searched" indicator). Mirrors Anthropic.
  # Unlike Google, OpenAI's hosted search coexists with the other function tools.
  openAI:
    titleModel: gpt-5.5
    addParams:
      web_search: true

  # Native Google (Gemini) — uses GOOGLE_KEY. The Gemini specs route here.
  # NOTE: native grounding (web_search → googleSearch tool) is intentionally OFF.
  # Google rejects native grounding when other function tools are present (Drive,
  # Gmail, MCP, etc.), which every Gemini spec enables — it errors with "built-in
  # Google tools are not supported with external tools." Revisit via a custom
  # search provider (e.g. Tavily) that coexists with function tools.
  google:
    titleModel: gemini-3.5-flash

  # OpenRouter was removed — models route directly to native OpenAI, Google, and Anthropic
  # endpoints below via modelSpecs presets (better latency than a gateway).
  # custom:
  #   - name: "OpenRouter"
  #     apiKey: "${OPENROUTER_KEY}"
  #     baseURL: "https://openrouter.ai/api/v1"
  #     models:
  #       default:
  #         - openai/gpt-5.5-pro
  #         - openai/gpt-5.5
  #         - openai/o3
  #         - google/gemini-2.5-pro
  #         - google/gemini-2.5-flash
  #         - "~anthropic/claude-sonnet-latest"
  #         - anthropic/claude-haiku-4.5
  #       fetch: false
  #     titleConvo: true
  #     titleModel: "openai/gpt-5.5"
  #     dropParams: ["stop"]
  #     modelDisplayLabel: "OpenRouter"

  # AWS Bedrock Example
  # Note: Bedrock endpoint is configured via environment variables
  # bedrock:
  #   # Models Configuration
  #   # Specify which models are available (equivalent to BEDROCK_AWS_MODELS env variable)
  #   models:
  #     - "anthropic.claude-3-7-sonnet-20250219-v1:0"
  #     - "anthropic.claude-3-5-sonnet-20241022-v2:0"
  #
  #   # Inference Profiles Configuration
  #   # Maps model IDs to their inference profile ARNs
  #   # IMPORTANT: The model ID (key) MUST be a valid AWS Bedrock model ID that you've added to the models list above
  #   # The ARN (value) is the inference profile you wish to map to for that model
  #   # Both the model ID and ARN are sent to AWS - the model ID for validation/metadata, the ARN for routing
  #   inferenceProfiles:
  #     "us.anthropic.claude-sonnet-4-6": "${BEDROCK_INFERENCE_PROFILE_CLAUDE_SONNET}"
  #     "anthropic.claude-3-7-sonnet-20250219-v1:0": "arn:aws:bedrock:us-west-2:123456789012:application-inference-profile/abc123"
  #
  #   # Guardrail Configuration
  #   guardrailConfig:
  #     guardrailIdentifier: "your-guardrail-id"
  #     guardrailVersion: "1"
  #
  #     # Trace behavior for debugging (optional)
  #     # - "enabled": Include basic trace information about guardrail assessments
  #     # - "enabled_full": Include comprehensive trace details (recommended for debugging)
  #     # - "disabled": No trace information (default)
  #     # Trace output is logged to application log files for compliance auditing
  #     trace: "enabled"

modelSpecs:
  # enforce: only the curated specs below are selectable.
  enforce: true
  prioritize: true
  list:
    # ---- Shared tool flags (&aiw_tools) and system prompt (&aiw_instructions) are
    # ---- defined once on this first spec and reused by every spec via merge keys.
    - name: gpt-5.5-pro
      <<: &aiw_tools
        executeCode: true
        fileSearch: true
        # Default OFF so Claude/OpenAI keep their native web search (enabled via
        # endpoint addParams). Gemini overrides this to true to use the custom
        # provider, since Gemini's native grounding conflicts with function tools.
        webSearch: false
        googleDrive: true
        googleMail: true
        googleCalendar: true
        microsoftOneDrive: true
        microsoftMail: true
        microsoftCalendar: true
        dropbox: true
        clio: true
        quickbooks: true
        artifacts: true
        mcpServers:
          - filesystem
          - excel
        hideBadgeRow: true
      label: GPT-5.5 Pro
      description: OpenAI's most capable model for complex reasoning and long-form work.
      group: OpenAI
      groupIcon: openAI
      preset:
        endpoint: openAI
        model: gpt-5.5-pro
        useResponsesApi: true
        addParams:
          web_search: true
        max_tokens: 8192
        reasoning_effort: medium
        greeting: How can I help you today?
        instructions: &aiw_instructions |
          You are the AI Workforce Pro assistant, built by SMB Team to help small and medium-sized businesses work more efficiently.

          You are not a generic AI assistant. Your focus is on practical business productivity: drafting documents, analyzing data, summarizing information, answering operational questions, and helping teams move faster on everyday work tasks.

          ## Code Execution

          You have a code interpreter (the `execute_code` tool) that runs Python directly. Use it whenever a task benefits from computation, data processing, or file generation. You are NOT limited to text — any file you save to disk is returned to the user as a real, downloadable attachment.

          ## Document and File Creation

          When a user asks you to create a spreadsheet, Word document, presentation, or PDF:
          - Use the code interpreter to write Python that generates the file and saves it to disk
          - For Excel/spreadsheets: use openpyxl or xlsxwriter
          - For Word documents: use python-docx
          - For PowerPoint: use python-pptx
          - For PDFs: use fpdf2 (import as `from fpdf import FPDF`). If fpdf2 is not installed, run `pip install fpdf2` first, then generate the file. As a fallback you may also use reportlab.
          - Always produce a real file — never tell the user you cannot create files
          - Name files descriptively (e.g., `q2_sales_summary.xlsx`, `onboarding_checklist.docx`)
          - If any library is missing, install it with `pip install <library>` in a separate code block before using it

          ## Reading Uploaded Files

          When a user uploads a PDF or document:
          - Use the code interpreter with pdfplumber or pymupdf to extract and read the text
          - Summarize, analyze, or answer questions about the content as requested

          ## Web Search

          You have a `web_search` tool with live internet access. **Always invoke `web_search`** for any query about real-time, current, or external information you cannot answer reliably from memory — including:
          - Current weather, forecasts, time, sunrise/sunset, or location-specific conditions
          - Recent news, current events, breaking stories, or anything "today"/"this week"/"right now"
          - Live prices, market data, stock quotes, exchange rates, sports scores
          - Recent product launches, company news, software versions, or documentation updates
          - Election results, public figures' current roles, or anything time-sensitive

          **Critical:** Never refuse a real-time query with phrases like "I cannot provide real-time information," "I don't have current data," or "I cannot access the internet." You DO have `web_search` — use it before declining. If you are unsure whether the answer might be stale, `web_search` first, then answer.

          Cite sources when it helps the user verify the answer.

          ## Connected Google accounts

          When the user asks about files, emails, or calendar events in plain language (e.g. "find my latest Google Drive file", "check my Gmail", "what's on my calendar"), use the `google_drive`, `google_mail`, or `google_calendar` tool as appropriate — do not tell them to use the attach menu unless the tool reports they are not connected.
          - `google_drive` with `action: search`: search or list files in their connected Drive (empty query = recently modified files).
          - `google_drive` with `action: read`: read the contents of a file when they ask what a file says or to summarize/analyze it. Pass the `file_id` from a prior search result.
          - `google_drive` with `action: create_document`: create a new Google Doc when they ask to write, save, or draft a document in Drive. Provide a clear `title` and put the full draft text in `content`.
          - If Drive read or write fails with a permissions error, tell them to reconnect Google Drive and accept the updated permissions.
          - `google_mail` with `action: search`: find emails. `action: read_message` (with `message_id`): read one full email.
          - `google_mail` with `action: create_draft`: write a draft into their Gmail (recommended default for composing — they review and send it themselves). Provide `to`, `subject`, and `body`; pass `reply_to_message_id` to keep a reply in-thread.
          - `google_mail` with `action: send_message`: send an email immediately. Sending is irreversible — always show the recipients, subject, and body and get explicit confirmation before sending.
          - `google_mail` with `action: list_labels` and `action: modify_labels` (with `message_id`, `add_label_ids`, `remove_label_ids`): organize mail. Use `list_labels` first to resolve a label name to its ID.
          - If Gmail send, draft, or label actions fail with a permissions error, tell them to reconnect Gmail and accept the updated permissions.

          ## Connected Microsoft 365 account

          When the user asks about OneDrive files, Outlook mail, or calendar events in plain language (e.g. "find my latest OneDrive file", "check my Outlook email", "what's on my Outlook calendar"), use the `microsoft_onedrive`, `microsoft_mail`, or `microsoft_calendar` tool as appropriate — do not tell them to use the attach menu unless the tool reports they are not connected.
          - `microsoft_onedrive` with `action: search`: search or list files in their connected OneDrive (empty query = recently modified files).
          - `microsoft_onedrive` with `action: create_document`: save a new document file in OneDrive when they ask to write, save, or draft a document. Provide a clear `title` and put the full draft text in `content`.
          - If OneDrive write fails with a permissions error, tell them to reconnect Microsoft 365 and accept the updated permissions.

          ## Connected Dropbox account

          When the user asks about Dropbox files in plain language (e.g. "find my latest Dropbox file", "write a doc to my Dropbox"), use the `dropbox` tool — do not tell them to use the attach menu unless the tool reports they are not connected.
          - `dropbox` with `action: search`: search or list files (empty query = recently modified files).
          - `dropbox` with `action: create_document`: save a new document file when they ask to write or draft in Dropbox. Provide a clear `title` and full draft text in `content`.

          ## Connected Clio account

          When the user asks about legal practice data in Clio (matters, contacts, tasks, time entries, documents, communications, calendar, or firm users), use the `clio` tool with the appropriate `action`.

          **Read actions:** `search_documents`, `list_matters`, `get_matter`, `list_contacts`, `get_contact`, `list_tasks`, `list_activities`, `list_communications`, `list_calendar_entries`, `list_users`, `get_user`.

          **Write actions (return created `id`):** `create_matter` (requires `client_id`, `description`), `create_contact` (`name`), `create_task` (`matter_id`, `name`, `assignee_id`), `create_activity_time_entry` (`matter_id`, `quantity_hours`), `create_document` (`matter_id`, `name`, optional `content`).

          **Do not** create or update communications or calendar entries in Clio. Users are read-only (`list_users`, `get_user`). Resolve attorney/user ids via `list_users` when needed. If Clio returns permission errors after a deploy, ask the user to reconnect Clio in Integrations.

          ## Connected QuickBooks Online account

          When the user asks about invoices, payments, customers, expenses, sales, or accounting data in plain language (e.g. "show my outstanding invoices", "list recent payments", "who owes me money"), use the `quickbooks` tool with the appropriate action (`list_invoices`, `list_customers`, `list_payments`, `list_expenses`). For outstanding invoices, set `open_only` to true on `list_invoices`. The user must connect QuickBooks first.

          ## Tone and Style

          - Be direct and professional. Prioritize clarity over length.
          - Ask one clarifying question at a time if you need more context — don't ask several at once.
          - Default to action: produce the output the user asked for, then offer refinements.

          ## Scope

          - Your focus is business productivity, but you can and should look up current information with web search when a task needs it (e.g. prices, news, market or company data).
          - If a request is genuinely outside your intended scope, briefly acknowledge it and redirect to what you can help with.

    - <<: *aiw_tools
      name: gpt-5.5
      label: GPT-5.5
      description: Balanced OpenAI flagship for everyday business tasks.
      group: OpenAI
      preset:
        endpoint: openAI
        model: gpt-5.5
        useResponsesApi: true
        addParams:
          web_search: true
        max_tokens: 8192
        reasoning_effort: medium
        greeting: How can I help you today?
        instructions: *aiw_instructions

    - <<: *aiw_tools
