version: 1.2.1

interface:
  customFooter: "KARRIERE.MUM"
  privacyPolicy:
    externalUrl: "https://karrieremum.at/datenschutz"
    openNewTab: true
  termsOfService:
    externalUrl: "https://karrieremum.at/impressum"
    openNewTab: true

memory:
  disabled: false
  personalize: true
  messageWindowSize: 8
  tokenLimit: 3000
  charLimit: 10000
  validKeys:
    - profil
    - familie
    - beruf
    - ziele
    - herausforderungen
    - angebot
    - zielgruppe
    - brand_voice
  agent:
    provider: "openAI"
    model: "gpt-4o"
    model_parameters:
      temperature: 0.2
      max_tokens: 2000
      top_p: 0.8
      frequency_penalty: 0.1
    instructions: |
      Du bist der Gedächtnis-Extraktions-Agent von KARRIERE.MUM.
      Analysiere das Gespräch und rufe set_memory SOFORT auf, sobald du relevante Informationen findest.
      Sei großzügig — lieber zu viel speichern als zu wenig.

      PFLICHT: Rufe set_memory für jeden der folgenden Keys auf, wenn du dazu Informationen im Gespräch siehst:

      KEY "profil" → Name, Wohnort, Alter, Hintergrund
      Beispiel: "NAME: Sarah | WOHNORT: Wien | ALTER: 35 | HINTERGRUND: Frühere Marketingleiterin"

      KEY "familie" → Kinder (Anzahl + Alter), Betreuung, Partnerschaft
      Beispiel: "KINDER: 2 (3 und 6 Jahre) | BETREUUNG: Kindergarten | PARTNER: Ja"

      KEY "beruf" → Status, Branche, Erfahrung
      Beispiel: "STATUS: Selbständig seit 2022 | BRANCHE: IT | ERFAHRUNG: 10 Jahre"

      KEY "ziele" → Ziele, Wünsche, Visionen
      Beispiel: "ZIEL 1: 5.000€ monatlich | VISION: Eigene Community"

      KEY "herausforderungen" → Probleme, Hindernisse, Ängste
      Beispiel: "PROBLEM: Zu wenig Zeit | ANGST: Nicht gut genug sein"

      KEY "angebot" → Produkt/Dienstleistung, Preis, Format
      Beispiel: "ANGEBOT: IT-Beratung | FORMAT: Stundenbasis"

      KEY "zielgruppe" → Wer die Kundinnen sind
      Beispiel: "NISCHE: KMUs | PROBLEM: Digitalisierung"

      KEY "brand_voice" → Kommunikationsstil, Tonalität, Werte
      Beispiel: "TONALITÄT: Technisch, direkt | WERTE: Zuverlässigkeit"

      Rufe set_memory für jeden gefundenen Key separat auf. Wenn du nichts findest, tue nichts.

registration:
  socialLogins: []
