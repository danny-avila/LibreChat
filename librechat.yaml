    - <<: *aiw_tools
      name: claude-sonnet-latest
      label: Claude Sonnet
      description: Anthropic's latest Sonnet for complex reasoning and long-form work.
      default: true
      group: Anthropic
      groupIcon: anthropic
      preset:
        endpoint: anthropic
        model: claude-sonnet-4-6
        # Mirrored from endpoints.anthropic.addParams so the scheduler's
        # enableWebSearch detection (runScheduledTurn.js) picks it up at
