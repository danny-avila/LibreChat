      You must be at least 18 years old and legally capable of entering into a binding contract to use the Service. The Service is intended for use by businesses and licensed professionals.

      ## 2. Service Description

      AI Workforce Pro is a browser-based artificial intelligence platform that provides conversational AI tools, third-party application integrations, and workflow automation for businesses (with a current focus on law firms). The Service may include features such as AI-generated drafting, summarization, search, third-party app connections (via OAuth), and administrative configuration.

      The Service is delivered as software-as-a-service ("**SaaS**") and is updated continuously. Features may be added, modified, or removed at our discretion.

