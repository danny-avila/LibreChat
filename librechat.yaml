# ==============================================================================
# ENVIRONMENT VARIABLES NEEDED
# ==============================================================================
# Make sure to set these in your .env file:
#
# Core API Keys:
# OPENAI_API_KEY=sk-...
# ANTHROPIC_API_KEY=sk-ant-...
# GOOGLE_API_KEY=AI...
#
# Custom Providers (optional):
# GROQ_API_KEY=gsk_...
# MISTRAL_API_KEY=...
# OPENROUTER_KEY=sk-or-...
# PERPLEXITY_API_KEY=pplx-...
#
# Web Search (choose at least one):
# SERPER_API_KEY=...
# JINA_API_KEY=...
# COHERE_API_KEY=...
# FIRECRAWL_API_KEY=...
#
# File Storage (if using S3):
# S3_BUCKET=your-bucket
# S3_REGION=us-east-1
# S3_ACCESS_KEY_ID=...
# S3_SECRET_ACCESS_KEY=...
#
# Authentication (optional):
# GITHUB_CLIENT_ID=...
# GITHUB_CLIENT_SECRET=...
# GOOGLE_CLIENT_ID=...
# GOOGLE_CLIENT_SECRET=...
# DISCORD_CLIENT_ID=...
# DISCORD_CLIENT_SECRET=...

# ==============================================================================
# NOTES
# ==============================================================================
# 1. Replace all ${VARIABLE_NAME} with actual values in your .env file
# 2. Update file paths (e.g., MCP server filesystem path)
# 3. Adjust rate limits based on your expected usage
# 4. For production, consider using S3/Firebase for file storage
# 5. Review security settings (allowedDomains) for your use case
# 6. Test each provider separately to ensure API keys work
# 7. Monitor costs - some providers charge per request
# 8. Back up this configuration file regularly
#     #   temperature: 0.1
