# LibreChat Configuration

## Query Handling

### Farming Equipment and Machinery
- Queries related to farm equipment and machinery are handled as follows:
  - **General Crop Queries:**
    - Crop: "General"
    - Domain: "Farm Machinery"
  - **Soil-Related Queries:**
    - Crop: "all"
    - State: "all"

### Topics
- The following topics will be added to all three model presets:
  - Farm Equipment
  - Machinery Rentals
  - Repairs
  - Farming Tools

## Model Presets

1. **Model 1:**
   - Topics: Farm Equipment, Machinery Rentals, Repairs, Farming Tools

2. **Model 2:**
   - Topics: Farm Equipment, Machinery Rentals, Repairs, Farming Tools

3. **Model 3:**
   - Topics: Farm Equipment, Machinery Rentals, Repairs, Farming Tools

