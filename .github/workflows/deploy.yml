name: Deploy to Coolify

on:
  push:
    branches: [main]

jobs:
  trigger-coolify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy
        run: |
          curl -fsS -X POST "${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            --max-time 30
