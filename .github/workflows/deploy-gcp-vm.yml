name: Deploy to GCP VM

on:
  push:
    branches:
      - main
    # A push to main only fires this workflow if it touches at least one file
    # OUTSIDE every listed path. Runtime-irrelevant paths belong here so we don't
    # rebuild + restart the container for changes that produce an identical image.
    #   - `.github/**` — workflow / CI files, executed by GitHub Actions, not the VM
    #   - `docs/**`    — documentation directory; no runtime consumers (grepped 2026-07-08)
    #   - `**.md`      — README / plan / CLAUDE.md files anywhere; no `.md` is
    #                    imported or readFileSync'd by prod code paths as of 2026-07-08
    paths-ignore:
      - '.github/**'
      - 'docs/**'
      - '**.md'
  # Allows this workflow to be dispatched programmatically (e.g. by the
  # scheduled-merge workflow's post-merge step, or manually via `gh workflow run`).
  # Required because pushes made by GITHUB_TOKEN do not themselves trigger
  # downstream workflows (GitHub's anti-recursion guardrail), so scheduled auto-
  # merges must dispatch this workflow explicitly to land the merged code in prod.
  workflow_dispatch:

concurrency:
  group: deploy-gcp-vm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 60
    steps:
      - name: Pull latest code
        run: |
          set -e
          git config --global --add safe.directory ${{ vars.GCP_VM_APP_DIR }}
          cd ${{ vars.GCP_VM_APP_DIR }}
          echo "==> Pulling latest main..."
          git fetch origin main
          git reset --hard origin/main

      - name: Detect change scope
        id: scope
        run: |
          cd ${{ vars.GCP_VM_APP_DIR }}
          CHANGED=$(git diff HEAD~1 --name-only 2>/dev/null || echo "unknown")
          echo "Changed files: $CHANGED"
          if echo "$CHANGED" | grep -qvE '^librechat\.(yaml|yml)$'; then
            echo "type=full" >> $GITHUB_OUTPUT
            echo "==> Full rebuild required (non-yaml files changed)."
          else
            echo "type=config" >> $GITHUB_OUTPUT
            echo "==> Config-only change — skipping Docker build."
          fi

      - name: Rebuild and restart containers (full deploy)
        if: steps.scope.outputs.type == 'full'
        env:
          # Required for the Dockerfile's `--mount=type=cache` build cache (npm +
          # Turborepo). BuildKit is the compose v2 default, but set it explicitly
          # so the build can't fall back to the legacy builder (which errors on
          # the cache-mount syntax).
          DOCKER_BUILDKIT: '1'
          COMPOSE_DOCKER_CLI_BUILD: '1'
        run: |
          set -e
          cd ${{ vars.GCP_VM_APP_DIR }}
          echo "==> Building image from source (cached layers + Turbo cache)..."
          docker compose build api
          echo "==> Restarting containers..."
          docker compose up -d

      - name: Restart API only (config-only deploy)
        if: steps.scope.outputs.type == 'config'
        run: |
          set -e
          cd ${{ vars.GCP_VM_APP_DIR }}
          echo "==> Restarting API container to pick up config changes..."
          docker compose restart api
          echo "==> API restarted."

      - name: Verify containers running
        run: |
          cd ${{ vars.GCP_VM_APP_DIR }}
          docker compose ps
          echo "==> Containers up."

      - name: Health check
        run: |
          set -e
          echo "==> Waiting 30s for app to be ready..."
          sleep 30
          echo "==> Probing /api/config..."
          for i in 1 2 3 4 5; do
            if curl -fs http://localhost:3080/api/config > /dev/null; then
              echo "==> App is healthy."
              exit 0
            fi
            echo "==> Attempt $i: not yet responding, retrying in 10s..."
            sleep 10
          done
          echo "==> Health check FAILED. Last 50 lines of api logs:"
          cd ${{ vars.GCP_VM_APP_DIR }}
          docker compose logs --tail=50 api
          exit 1
