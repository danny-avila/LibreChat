name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: '730335261767'
  ECR_REPOSITORY: librechat
  ECS_CLUSTER: juristai-librechat-ecs-cluster
  ECS_SERVICE: librechat-service
  ECS_TASK_FAMILY: librechat-task
  ECS_CONTAINER_NAME: librechat-container
  CONTAINER_PORT: '3080'
  TASK_CPU: '512'
  TASK_MEMORY: '1024'
  EXECUTION_ROLE_ARN: arn:aws:iam::730335261767:role/ecsTaskExecutionRole
  TASK_ROLE_ARN: arn:aws:iam::730335261767:role/ecsTaskRole
  LOG_GROUP: /ecs/librechat
  LOG_STREAM_PREFIX: librechat-container
  APP_PORT: ${{ vars.APP_PORT || '3080' }}
  APP_HOST: ${{ vars.APP_HOST || '0.0.0.0' }}
  CONSOLE_JSON: ${{ vars.CONSOLE_JSON || 'true' }}
  DEBUG_OPENAI: ${{ vars.DEBUG_OPENAI || 'true' }}
  POSTGRES_USER: ${{ vars.POSTGRES_USER || 'postgres' }}
  POSTGRES_DB: ${{ vars.POSTGRES_DB || 'librechat' }}
  ALLOW_REGISTRATION: ${{ vars.ALLOW_REGISTRATION || 'true' }}
  SESSION_EXPIRY: ${{ vars.SESSION_EXPIRY || '1000 * 60 * 60 * 24 * 360' }}
  REFRESH_TOKEN_EXPIRY: ${{ vars.REFRESH_TOKEN_EXPIRY || '1000 * 60 * 60 * 24 * 360' }}
  ALLOW_SOCIAL_LOGIN: ${{ vars.ALLOW_SOCIAL_LOGIN || 'false' }}
  RAG_PORT: ${{ vars.RAG_PORT || '8000' }}
  BAN_VIOLATIONS: ${{ vars.BAN_VIOLATIONS || 'false' }}
  MEILI_HOST: ${{ vars.MEILI_HOST }}
  MEILI_MASTER_KEY: ${{ vars.MEILI_MASTER_KEY || '' }}

jobs:
  build:
    name: Build Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}
      image_tag: ${{ steps.image.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate ECS task sizing
        run: node scripts/validate-ecs-task-sizing.js

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Define image tag
        id: image
        run: |
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name != 'pull_request'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: docker build --no-cache -t "${{ steps.image.outputs.image_uri }}" .

      - name: Verify LibreChat frontend artifact
        run: docker run --rm "${{ steps.image.outputs.image_uri }}" sh -c "ls -la /app/client/dist && test -f /app/client/dist/index.html && echo client dist OK"

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        run: docker push "${{ steps.image.outputs.image_uri }}"

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    environment: publish
    permissions:
      contents: read
    env:
      IMAGE_URI: ${{ needs.build.outputs.image_uri }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      MONGO_URI: ${{ secrets.MONGO_URI }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      CREDS_IV: ${{ secrets.CREDS_IV }}
      CREDS_KEY: ${{ secrets.CREDS_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ASSISTANTS_API_KEY: ${{ secrets.ASSISTANTS_API_KEY }}
      PGVECTOR_HOST: ${{ secrets.PGVECTOR_HOST }}
      RAG_API_URL: ${{ secrets.RAG_API_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate ECS task sizing
        run: node scripts/validate-ecs-task-sizing.js

      - name: Validate publish environment configuration
        shell: bash
        run: |
          missing=()

          require_value() {
            local key="$1"
            local value="$2"
            if [ -z "$value" ]; then
              missing+=("$key")
            fi
          }

          require_value "PGVECTOR_HOST (publish secret)" "${PGVECTOR_HOST}"
          require_value "RAG_API_URL (publish secret)" "${RAG_API_URL}"
          require_value "MONGO_URI (publish secret)" "${MONGO_URI}"
          require_value "JWT_SECRET (publish secret)" "${JWT_SECRET}"
          require_value "JWT_REFRESH_SECRET (publish secret)" "${JWT_REFRESH_SECRET}"
          require_value "CREDS_KEY (publish secret)" "${CREDS_KEY}"
          require_value "CREDS_IV (publish secret)" "${CREDS_IV}"
          require_value "OPENAI_API_KEY (publish secret)" "${OPENAI_API_KEY}"
          require_value "ASSISTANTS_API_KEY (publish secret)" "${ASSISTANTS_API_KEY}"

          if [ ${#missing[@]} -gt 0 ]; then
            printf 'Missing required publish environment configuration:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render ECS task definition
        shell: bash
        run: |
          jq -n \
            --arg family "${ECS_TASK_FAMILY}" \
            --arg containerName "${ECS_CONTAINER_NAME}" \
            --arg image "${IMAGE_URI}" \
            --argjson containerPort "${CONTAINER_PORT}" \
            --arg postgresUser "${POSTGRES_USER}" \
            --arg jwtRefreshSecret "${JWT_REFRESH_SECRET}" \
            --arg refreshTokenExpiry "${REFRESH_TOKEN_EXPIRY}" \
            --arg appPort "${APP_PORT}" \
            --arg consoleJson "${CONSOLE_JSON}" \
            --arg mongoUri "${MONGO_URI}" \
            --arg debugOpenai "${DEBUG_OPENAI}" \
            --arg appHost "${APP_HOST}" \
            --arg postgresDb "${POSTGRES_DB}" \
            --arg allowRegistration "${ALLOW_REGISTRATION}" \
            --arg sessionExpiry "${SESSION_EXPIRY}" \
            --arg meiliMasterKey "${MEILI_MASTER_KEY}" \
            --arg allowSocialLogin "${ALLOW_SOCIAL_LOGIN}" \
            --arg pgvectorHost "${PGVECTOR_HOST}" \
            --arg jwtSecret "${JWT_SECRET}" \
            --arg ragPort "${RAG_PORT}" \
            --arg credsIv "${CREDS_IV}" \
            --arg ragApiUrl "${RAG_API_URL}" \
            --arg banViolations "${BAN_VIOLATIONS}" \
            --arg credsKey "${CREDS_KEY}" \
            --arg openaiApiKey "${OPENAI_API_KEY}" \
            --arg assistantsApiKey "${ASSISTANTS_API_KEY}" \
            --arg meiliHost "${MEILI_HOST}" \
            --arg logGroup "${LOG_GROUP}" \
            --arg awsRegion "${AWS_REGION}" \
            --arg logStreamPrefix "${LOG_STREAM_PREFIX}" \
            --arg taskCpu "${TASK_CPU}" \
            --arg taskMemory "${TASK_MEMORY}" \
            --arg executionRoleArn "${EXECUTION_ROLE_ARN}" \
            --arg taskRoleArn "${TASK_ROLE_ARN}" \
            '{
              family: $family,
              networkMode: "awsvpc",
              containerDefinitions: [
                {
                  name: $containerName,
                  image: $image,
                  cpu: 0,
                  portMappings: [
                    {
                      containerPort: $containerPort,
                      hostPort: $containerPort,
                      protocol: "tcp"
                    }
                  ],
                  essential: true,
                  environment: [
                    { name: "POSTGRES_USER", value: $postgresUser },
                    { name: "JWT_REFRESH_SECRET", value: $jwtRefreshSecret },
                    { name: "REFRESH_TOKEN_EXPIRY", value: $refreshTokenExpiry },
                    { name: "PORT", value: $appPort },
                    { name: "CONSOLE_JSON", value: $consoleJson },
                    { name: "MONGO_URI", value: $mongoUri },
                    { name: "DEBUG_OPENAI", value: $debugOpenai },
                    { name: "HOST", value: $appHost },
                    { name: "POSTGRES_DB", value: $postgresDb },
                    { name: "ALLOW_REGISTRATION", value: $allowRegistration },
                    { name: "SESSION_EXPIRY", value: $sessionExpiry },
                    { name: "MEILI_MASTER_KEY", value: $meiliMasterKey },
                    { name: "ALLOW_SOCIAL_LOGIN", value: $allowSocialLogin },
                    { name: "PGVECTOR_HOST", value: $pgvectorHost },
                    { name: "JWT_SECRET", value: $jwtSecret },
                    { name: "RAG_PORT", value: $ragPort },
                    { name: "CREDS_IV", value: $credsIv },
                    { name: "RAG_API_URL", value: $ragApiUrl },
                    { name: "BAN_VIOLATIONS", value: $banViolations },
                    { name: "CREDS_KEY", value: $credsKey },
                    { name: "OPENAI_API_KEY", value: $openaiApiKey },
                    { name: "ASSISTANTS_API_KEY", value: $assistantsApiKey },
                    { name: "MEILI_HOST", value: $meiliHost }
                  ],
                  mountPoints: [],
                  volumesFrom: [],
                  logConfiguration: {
                    logDriver: "awslogs",
                    options: {
                      "awslogs-group": $logGroup,
                      "awslogs-region": $awsRegion,
                      "awslogs-stream-prefix": $logStreamPrefix
                    }
                  },
                  systemControls: []
                }
              ],
              requiresCompatibilities: ["FARGATE"],
              cpu: $taskCpu,
              memory: $taskMemory,
              executionRoleArn: $executionRoleArn,
              taskRoleArn: $taskRoleArn
            }' > task-definition.json

      - name: Register ECS task definition
        id: register
        shell: bash
        run: |
          TASK_DEFINITION_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://task-definition.json \
            --region "${AWS_REGION}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"
          echo "task_definition_arn=${TASK_DEFINITION_ARN}" >> "$GITHUB_OUTPUT"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --task-definition "${{ steps.register.outputs.task_definition_arn }}" \
            --force-new-deployment \
            --region "${AWS_REGION}"

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}" \
            --region "${AWS_REGION}"

      - name: Show deployed task definition
        run: |
          aws ecs describe-services \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}" \
            --region "${AWS_REGION}" \
            --query "services[0].taskDefinition"
