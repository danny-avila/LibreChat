name: Build & Deploy LibreChat
on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # e.g. v1.2.3  →  deploys to prod

permissions:
  id-token: write
  contents: read
  packages: write

env:
  ACR_NAME:  kaleidoscopeaieducation
  ACR_LOGIN: kaleidoscopeaieducation-ajfgb4ceepedbyc5.azurecr.io
  RG_CORE:   main-container-repo
  BICEP_FILE: infra/main.bicep
  APP_IMAGE: libreclient
  NODE_ENV: production

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Build image and push to ACR  (runs on both branch and tag)
  # ─────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Azure login (OIDC)
      uses: azure/login@v2
      with:
        client-id:       ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Pin Azure CLI to 2.72.0
      run: |
        sudo apt-get remove -y azure-cli
        python -m pip install --quiet --no-cache-dir "azure-cli==2.72.0"
        az --version | head -2

    - name: ACR login
      run: az acr login --name $ACR_NAME

    - name: Build & push image
      run: |
        docker build -t $ACR_LOGIN/$APP_IMAGE:${{ github.sha }} .
        docker push  $ACR_LOGIN/$APP_IMAGE:${{ github.sha }}
        # On a version tag, also push a human-readable tag (e.g. v1.2.3)
        if [[ "${{ github.ref_type }}" == "tag" ]]; then
          docker tag $ACR_LOGIN/$APP_IMAGE:${{ github.sha }} $ACR_LOGIN/$APP_IMAGE:${{ github.ref_name }}
          docker push $ACR_LOGIN/$APP_IMAGE:${{ github.ref_name }}
        fi

  # ─────────────────────────────────────────────────────────────
  # 2. Deploy to TEST  (every push to main)
  # ─────────────────────────────────────────────────────────────
  deploy-test:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'
    steps:
    - uses: actions/checkout@v4

    - name: Azure login (OIDC)
      uses: azure/login@v2
      with:
        client-id:       ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Pin Azure CLI to 2.72.0
      run: |
        sudo apt-get remove -y azure-cli
        python -m pip install --quiet --no-cache-dir "azure-cli==2.72.0"

    - name: Build parameter file (test)
      run: |
        cat > deploy-params.json <<EOF
        {
          "acrName":          { "value": "$ACR_NAME" },
          "imageTag":         { "value": "${{ github.sha }}" },
          "appName":          { "value": "libreclient-test" },
          "acaEnvName":       { "value": "env-librechat-test" },
          "logAnalyticsName": { "value": "law-librechat-test" },
          "mongoUri":         { "value": "${{ secrets.MONGO_URI_TEST }}" },
          "openaiApiKey":     { "value": "${{ secrets.OPENAI_API_KEY }}" },
          "encryptionKey":    { "value": "${{ secrets.ENCRYPTION_KEY }}" },
          "credsKey":         { "value": "${{ secrets.CREDS_KEY }}" },
          "credsIv":          { "value": "${{ secrets.CREDS_IV }}" },
          "jwtSecret":        { "value": "${{ secrets.JWT_SECRET }}" },
          "jwtRefreshSecret": { "value": "${{ secrets.JWT_REFRESH_SECRET }}" },
          "smtpUser":         { "value": "${{ secrets.EMAIL_USERNAME }}" },
          "smtpPass":         { "value": "${{ secrets.EMAIL_PASSWORD }}" },
          "assistantsApiKey": { "value": "${{ secrets.ASSISTANTS_API_KEY }}" },
          "anthropicApiKey":  { "value": "${{ secrets.ANTHROPIC_API_KEY }}" },
          "customDomain":     { "value": "" },
          "certId":           { "value": "" },
          "domainClient":     { "value": "${{ secrets.DOMAIN_CLIENT_TEST }}" }
        }
        EOF

    - name: Deploy to ACA (test)
      run: |
        az deployment group create \
          --resource-group "$RG_CORE" \
          --template-file "$BICEP_FILE" \
          --parameters @deploy-params.json

  # ─────────────────────────────────────────────────────────────
  # 3. Deploy to PROD  (only on version tags like v1.2.3)
  # ─────────────────────────────────────────────────────────────
  deploy-prod:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
    - uses: actions/checkout@v4

    - name: Azure login (OIDC)
      uses: azure/login@v2
      with:
        client-id:       ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Pin Azure CLI to 2.72.0
      run: |
        sudo apt-get remove -y azure-cli
        python -m pip install --quiet --no-cache-dir "azure-cli==2.72.0"

    - name: Build parameter file (prod)
      run: |
        cat > deploy-params.json <<EOF
        {
          "acrName":          { "value": "$ACR_NAME" },
          "imageTag":         { "value": "${{ github.sha }}" },
          "appName":          { "value": "libreclient" },
          "acaEnvName":       { "value": "env-librechat" },
          "logAnalyticsName": { "value": "law-librechat" },
          "mongoUri":         { "value": "${{ secrets.MONGO_URI }}" },
          "openaiApiKey":     { "value": "${{ secrets.OPENAI_API_KEY }}" },
          "encryptionKey":    { "value": "${{ secrets.ENCRYPTION_KEY }}" },
          "credsKey":         { "value": "${{ secrets.CREDS_KEY }}" },
          "credsIv":          { "value": "${{ secrets.CREDS_IV }}" },
          "jwtSecret":        { "value": "${{ secrets.JWT_SECRET }}" },
          "jwtRefreshSecret": { "value": "${{ secrets.JWT_REFRESH_SECRET }}" },
          "smtpUser":         { "value": "${{ secrets.EMAIL_USERNAME }}" },
          "smtpPass":         { "value": "${{ secrets.EMAIL_PASSWORD }}" },
          "assistantsApiKey": { "value": "${{ secrets.ASSISTANTS_API_KEY }}" },
          "anthropicApiKey":  { "value": "${{ secrets.ANTHROPIC_API_KEY }}" },
          "customDomain":     { "value": "chat.kaleidoscopeai.net" },
          "certId":           { "value": "${{ secrets.CERT_ID_PROD }}" },
          "domainClient":     { "value": "https://chat.kaleidoscopeai.net" }
        }
        EOF

    - name: Deploy to ACA (prod)
      run: |
        az deployment group create \
          --resource-group "$RG_CORE" \
          --template-file "$BICEP_FILE" \
          --parameters @deploy-params.json
