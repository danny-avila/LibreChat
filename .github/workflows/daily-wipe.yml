name: Monthly Balance Expiry Janitor
on:
  schedule:
    - cron: '0 16 * * *' # Runs daily at midnight PH time
  workflow_dispatch: 

jobs:
  expire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        # Added the flag to bypass version conflicts
        run: npm install mongoose --legacy-peer-deps 
        
      - name: Run Expiry Script
        run: node api/scripts/expireBalances.js
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
