name: NJ Clear User

on:
  workflow_dispatch:
    inputs:
      email:
        description: Email address of the user to clear
        required: true
        type: string
      environment:
        description: Target environment
        type: choice
        options:
          - dev
          - prod
        required: true
        default: dev

jobs:
  clear-user:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}-deploy
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Clear OpenID from database
        run: |
          aws lambda invoke \
            --function-name ai-assistant-clear-user \
            --payload "$(jq -n --arg email "$EMAIL" '{email: $email}')" \
            --cli-binary-format raw-in-base64-out \
            response.json
          cat response.json
          jq -e '.statusCode == 200' response.json
        env:
          EMAIL: ${{ inputs.email }}

      - name: Delete from Cognito
        run: |
          USERNAMES=$(aws cognito-idp list-users \
            --user-pool-id "$USER_POOL_ID" \
            --filter "email = \"$EMAIL\"" \
            --query 'Users[].Username' \
            --output text)

          if [ -z "$USERNAMES" ]; then
            echo "No Cognito users found for $EMAIL"
            exit 0
          fi

          for USERNAME in $USERNAMES; do
            echo "Deleting $USERNAME"
            aws cognito-idp admin-delete-user \
              --user-pool-id "$USER_POOL_ID" \
              --username "$USERNAME"
          done
        env:
          EMAIL: ${{ inputs.email }}
          USER_POOL_ID: ${{ secrets.USER_POOL_ID }}
