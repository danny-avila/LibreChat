name: Sync Upstream LibreChat

on:
  schedule:
    - cron: '0 9 * * 3' # Every Wednesday at 9:00 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: 3185872
          private-key: ${{ secrets.AI_ASSISTANT_APP }}

      - name: Checkout newjersey
        uses: actions/checkout@v6
        with:
          ref: newjersey
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream main
        run: |
          git remote add upstream https://github.com/danny-avila/LibreChat.git
          git fetch upstream main

      - name: Check for new upstream commits
        id: check
        run: |
          COUNT=$(git rev-list HEAD..upstream/main --count)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: No new commits — skipping
        if: steps.check.outputs.count == '0'
        run: echo "upstream/main has no new commits since newjersey. Nothing to do."

      - name: Create merge branch
        if: steps.check.outputs.count != '0'
        id: vars
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="upstream-merge/$DATE"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Merge upstream main
        if: steps.check.outputs.count != '0'
        id: merge
        run: |
          UPSTREAM_SHA=$(git rev-parse upstream/main)
          echo "upstream_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"
          if ! git merge upstream/main --no-edit; then
            echo "conflicted=true" >> "$GITHUB_OUTPUT"
            CONFLICTED_FILES=$(git grep -l '^<<<<<<< ' | sed 's/^/  /')
            git add -A
            COMMIT_MSG=$(printf 'chore: merge upstream main (conflicts need resolution)\n\nConflicted files:\n%s' "$CONFLICTED_FILES")
            git commit -m "$COMMIT_MSG"
          fi

      - name: Push merge branch
        if: steps.check.outputs.count != '0'
        run: git push origin "${{ steps.vars.outputs.branch }}"

      - name: Create PR
        if: steps.check.outputs.count != '0'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BODY="Automated sync of upstream [\`danny-avila/LibreChat\`](https://github.com/danny-avila/LibreChat) \`main\` into \`newjersey\`.
          
          Please:

          - [ ] Resolve any merge conflicts & failing tests.
          - [ ] Smoke test this branch locally (pull down, run, verify it's okay).
          - [ ] Merge PR w/ a merge commit (NOT squash or rebase).
          "

          if [ "${{ steps.merge.outputs.conflicted }}" = "true" ]; then
            CONFLICT=$(printf '⚠️ **This merge has conflicts.** The branch was committed with conflict markers.\n\nTo restore mid-merge state and resolve conflicts interactively:\n```sh\ngit reset --hard HEAD^1 && git merge %s\n```' "${{ steps.merge.outputs.upstream_sha }}")
            BODY="${CONFLICT}"$'\n\n'"${BODY}"
          fi

          gh pr create \
            --repo ${{ github.repository }} \
            --base newjersey \
            --head "${{ steps.vars.outputs.branch }}" \
            --title "chore: sync upstream LibreChat main (${{ steps.vars.outputs.date }})" \
            --label "pr-review" \
            --body "$BODY"
