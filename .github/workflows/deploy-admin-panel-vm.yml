name: Deploy Admin Panel to VM

# The admin panel container was migrated from /home/greta/admin-panel-src/ to
# /opt/admin-panel/ on 2026-07-10 to follow the deploy pattern rules Eli
# established (no personal home dirs, shared deploy user, pipeline in repo).
# See feedback_deploy_pattern.md in project memory.
#
# The self-hosted runner on this VM runs as user `eli_gill`, who:
#   - IS in the `docker` group (can run docker without sudo)
#   - is NOT in `google-sudoers` and has no sudoers.d entry (cannot sudo)
#   - OWNS /opt/admin-panel/ directly (mirrors the /home/greta_smbteam_com/librechat/
#     ownership pattern that LibreChat's own deploy workflow relies on)
#
# So docker commands here do NOT use sudo. eli_gill can operate on the
# checkout and docker socket directly.
#
# KNOWN FOLLOW-UP: this workflow does NOT git-fetch before build. The initial
# clone was done manually by a sudo-capable user (via SSH deploy key registered
# under greta_smbteam_com). For future admin-panel merges to auto-deploy, we
# need eli_gill to have GitHub auth of their own (SSH deploy key + registered
# on the admin panel repo), OR we need a shared deploy user with pull access.
# Tracked as tech debt post-migration.

on:
  workflow_dispatch:

concurrency:
  group: deploy-admin-panel-vm
  cancel-in-progress: false

permissions:
  contents: read

env:
  APP_DIR: /opt/admin-panel
  OLD_APP_DIR: /home/greta/admin-panel-src
  OLD_CONTAINER_NAME: aiwp-admin-panel
  HEALTH_CHECK_URL: http://localhost:3000/

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Verify prerequisites (path + files exist)
        run: |
          set -e
          test -d "$APP_DIR" || (echo "ERROR: $APP_DIR does not exist"; exit 1)
          test -f "$APP_DIR/docker-compose.local.yml" || (echo "ERROR: $APP_DIR/docker-compose.local.yml missing"; exit 1)
          test -f "$APP_DIR/.env" || (echo "ERROR: $APP_DIR/.env missing"; exit 1)
          echo "==> Prerequisites OK. Contents:"
          ls -la "$APP_DIR" | head -10
          echo "==> Current git HEAD in $APP_DIR:"
          git -C "$APP_DIR" log --oneline -1 2>&1 || echo "(git status unavailable — will use whatever is on disk)"

      - name: Build new admin-panel image at /opt/admin-panel/
        env:
          DOCKER_BUILDKIT: '1'
          COMPOSE_DOCKER_CLI_BUILD: '1'
        run: |
          set -e
          cd "$APP_DIR"
          echo "==> Building admin-panel image..."
          docker compose -f docker-compose.local.yml build admin-panel

      - name: Stop old container (kept in stopped state for rollback)
        run: |
          set +e
          if docker inspect "$OLD_CONTAINER_NAME" >/dev/null 2>&1; then
            echo "==> Stopping old container $OLD_CONTAINER_NAME (kept for rollback)..."
            docker stop "$OLD_CONTAINER_NAME" || echo "old container already stopped"
          else
            echo "==> Old container $OLD_CONTAINER_NAME does not exist. First-time swap or already migrated."
          fi
          set -e

      - name: Start new container from /opt/admin-panel/
        run: |
          set -e
          cd "$APP_DIR"
          echo "==> Starting new admin-panel container..."
          docker compose -f docker-compose.local.yml up -d admin-panel
          echo "==> New container status:"
          docker compose -f docker-compose.local.yml ps admin-panel

      - name: Health check (rollback on failure)
        run: |
          set +e
          echo "==> Waiting for new container to respond on port 3000..."
          for i in 1 2 3 4 5 6 7 8; do
            if curl -sf -o /dev/null "$HEALTH_CHECK_URL" 2>/dev/null; then
              echo "==> Admin panel healthy on attempt $i. New container is live."
              # Health passed — safe to remove the stopped old container
              if docker inspect "$OLD_CONTAINER_NAME" >/dev/null 2>&1; then
                echo "==> Removing old container $OLD_CONTAINER_NAME (health check passed)..."
                docker rm "$OLD_CONTAINER_NAME" || echo "old container removal skipped"
              fi
              exit 0
            fi
            echo "==> Attempt $i: not responding, waiting 5s..."
            sleep 5
          done

          echo "HEALTH CHECK FAILED. Attempting rollback..."
          echo "==> New container logs (last 60 lines):"
          docker compose -f "$APP_DIR/docker-compose.local.yml" logs admin-panel --tail=60 || true

          echo "==> Stopping and removing failed new container..."
          docker compose -f "$APP_DIR/docker-compose.local.yml" down || true

          echo "==> Restarting old container from stopped state..."
          if docker inspect "$OLD_CONTAINER_NAME" >/dev/null 2>&1; then
            docker start "$OLD_CONTAINER_NAME"
            echo "==> Rolled back to old container $OLD_CONTAINER_NAME."
          else
            echo "==> WARNING: cannot roll back — old container no longer exists."
          fi

          echo "DEPLOY FAILED — see logs above."
          exit 1
