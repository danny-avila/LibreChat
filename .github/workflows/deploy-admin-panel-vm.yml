name: Deploy Admin Panel to VM

# Why this workflow lives in the AIWP repo (not the admin panel repo):
# The AIWP self-hosted runner is what actually lives on librechat-vm, where the
# admin panel container also runs. Putting the deploy here guarantees runner
# access without worrying about cross-repo runner-scope questions. Once the
# runner is promoted to org-scope, this can move to the admin panel repo and
# be push-triggered instead of dispatch-only.
#
# Background: the admin panel's `docker-publish.yml` (in the admin panel repo)
# only builds and pushes an image to GHCR. Nothing on the VM pulls / restarts
# the container. Result: every admin panel merge sits stale in prod until a
# human SSHes and refreshes it. This workflow closes that gap.

on:
  workflow_dispatch:

concurrency:
  group: deploy-admin-panel-vm
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Locate admin panel app directory
        id: locate
        run: |
          set -e
          # Priority 1: honor an explicit ADMIN_PANEL_APP_DIR repo variable if set.
          if [ -n "${{ vars.ADMIN_PANEL_APP_DIR }}" ]; then
            DIR="${{ vars.ADMIN_PANEL_APP_DIR }}"
            if [ -d "$DIR" ] && [ -f "$DIR/docker-compose.local.yml" ]; then
              echo "app_dir=$DIR" >> "$GITHUB_OUTPUT"
              echo "==> Using admin panel directory (from ADMIN_PANEL_APP_DIR var): $DIR"
              exit 0
            fi
            echo "WARNING: ADMIN_PANEL_APP_DIR=$DIR but that path is missing docker-compose.local.yml — falling through to auto-discovery."
          fi

          # Priority 2: auto-discover by searching common roots for a docker-compose.local.yml
          # that defines an `admin-panel` service. Robust against different checkout paths
          # (e.g. /home/greta_smbteam_com/, /root/, /opt/) without needing configuration.
          echo "==> Searching for admin panel checkout..."
          FOUND=""
          while IFS= read -r f; do
            if grep -qE '^\s*admin-panel:' "$f" 2>/dev/null; then
              FOUND="$(dirname "$f")"
              break
            fi
          done < <(find /home /root /opt /srv -maxdepth 5 -type f -name 'docker-compose.local.yml' 2>/dev/null)

          if [ -n "$FOUND" ]; then
            echo "app_dir=$FOUND" >> "$GITHUB_OUTPUT"
            echo "==> Discovered admin panel directory: $FOUND"
            exit 0
          fi

          echo "ERROR: could not auto-discover an admin panel checkout."
          echo "Fix: set the ADMIN_PANEL_APP_DIR repository variable to the correct path."
          echo "     Settings → Secrets and variables → Actions → Variables → New repository variable"
          echo ""
          echo "Debug output — all docker-compose.local.yml files under common roots:"
          find /home /root /opt /srv -maxdepth 5 -type f -name 'docker-compose.local.yml' 2>/dev/null || true
          exit 1

      - name: Pull latest admin panel code
        run: |
          set -e
          APP_DIR="${{ steps.locate.outputs.app_dir }}"
          git config --global --add safe.directory "$APP_DIR"
          cd "$APP_DIR"
          echo "==> Before fetch:"
          git log --oneline -1
          echo "==> Fetching origin main..."
          git fetch origin main
          git reset --hard origin/main
          echo "==> After reset:"
          git log --oneline -1

      - name: Build and restart admin-panel container
        env:
          # Required for `--mount=type=cache` in the Dockerfile.
          DOCKER_BUILDKIT: '1'
          COMPOSE_DOCKER_CLI_BUILD: '1'
        run: |
          set -e
          APP_DIR="${{ steps.locate.outputs.app_dir }}"
          cd "$APP_DIR"
          echo "==> Building admin-panel image..."
          docker compose -f docker-compose.local.yml build admin-panel
          echo "==> Restarting admin-panel container..."
          docker compose -f docker-compose.local.yml up -d admin-panel
          echo "==> Container status:"
          docker compose -f docker-compose.local.yml ps admin-panel

      - name: Health check
        run: |
          set -e
          APP_DIR="${{ steps.locate.outputs.app_dir }}"
          # Admin panel binds to :3000 inside its docker network; the compose file
          # maps it to the host on :3000 by default. If a custom PORT was set in
          # .env, this check may miss it — treat a non-200 as informational only.
          for i in 1 2 3 4 5 6; do
            if curl -sf -o /dev/null http://localhost:3000/ 2>/dev/null; then
              echo "==> Admin panel responding on :3000"
              exit 0
            fi
            echo "==> Attempt $i: not responding on :3000, waiting 5s..."
            sleep 5
          done
          echo "WARNING: admin panel did not respond on :3000 after 30s. Recent logs:"
          docker compose -f "$APP_DIR/docker-compose.local.yml" logs admin-panel --tail=60 || true
          # Exit non-zero so the run surfaces as failed; the container may still
          # be usable via a non-default port, so operator should verify manually.
          exit 1
