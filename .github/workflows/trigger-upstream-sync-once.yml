name: Trigger Upstream Sync (once)

on:
  push:
    branches: [main]
    paths: ['.github/workflows/trigger-upstream-sync-once.yml']

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'upstream-sync.yml',
              ref: 'main',
              inputs: { dry_run: 'false' },
            });
            console.log('Upstream sync workflow triggered.');
