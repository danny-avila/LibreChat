# Responds to `/gitnexus index` comments on pull requests.
#
# Gated to the same author_association roles (OWNER, MEMBER, COLLABORATOR)
# as the automatic PR index trigger. When a matching comment lands on a
# PR, this workflow dispatches `gitnexus-index.yml` with the PR number
# and head SHA so the existing indexing pipeline does the actual work.
#
# Use cases:
#   - Re-index a PR after a rebase without pushing a new commit
#   - Index a docs-only PR that was skipped by paths-ignore
#   - Re-run a failed index
#
# Supported commands:
#   /gitnexus index             — index with defaults (no embeddings)
#   /gitnexus index embeddings  — index with --embeddings enabled

name: GitNexus PR Command

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  actions: write # needed to dispatch gitnexus-index.yml

concurrency:
  group: gitnexus-pr-command-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  dispatch:
    # Only run for PR comments that start with /gitnexus from trusted users
    if: |
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/gitnexus') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Parse command and resolve PR head
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body.trim();
            const match = body.match(/^\/gitnexus\s+(\w+)(?:\s+(\w+))?/);
            if (!match) {
              core.setFailed(`Unrecognized command: ${body}. Try: /gitnexus index [embeddings]`);
              return;
            }
            const [, subcommand, modifier] = match;
            if (subcommand !== 'index') {
              core.setFailed(`Unknown subcommand: ${subcommand}. Only 'index' is supported.`);
              return;
            }
            const embeddings = modifier === 'embeddings' ? 'true' : 'false';

            // Resolve the PR's head SHA — listWorkflowDispatchRun needs a real ref.
            const prNum = context.payload.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNum,
            });
            core.setOutput('pr_number', String(prNum));
            core.setOutput('pr_ref', pr.head.sha);
            core.setOutput('embeddings', embeddings);
            core.info(`Dispatching index for PR #${prNum} at ${pr.head.sha} (embeddings=${embeddings})`);

      - name: Dispatch gitnexus-index workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'gitnexus-index.yml',
              ref: 'main',
              inputs: {
                pr_number: '${{ steps.parse.outputs.pr_number }}',
                pr_ref: '${{ steps.parse.outputs.pr_ref }}',
                embeddings: '${{ steps.parse.outputs.embeddings }}',
                force: 'false',
              },
            });

      - name: React to the comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });
