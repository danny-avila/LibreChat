name: Render and upload env file

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod
      deploy_kitchensink:
        description: 'Deploy kitchensink stack (dev only)'
        type: boolean
        required: false
        default: false

jobs:
  render-env:
    name: Render .env and upload to S3
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Validate inputs
        if: inputs.deploy_kitchensink && inputs.environment != 'dev'
        run: |
          echo "deploy_kitchensink is only supported for the dev environment"
          exit 1

      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Render env file
        shell: bash
        run: |
          set -euo pipefail

          export DEBUG=$([[ "${{ inputs.environment }}" == "dev" ]] && echo true || echo false)
          export CONFIG_PATH=$([[ "${{ inputs.deploy_kitchensink }}" == "true" ]] && echo "nj/kitchensink-librechat.yaml" || echo "nj/nj-librechat.yaml")
          export DOMAIN=$([[ "${{ inputs.deploy_kitchensink }}" == "true" ]] && echo "https://kitchensink.ai-assistant.nj.gov" || echo "${{ secrets.DOMAIN }}")
          export ALLOW_SOCIAL_LOGIN=$([[ "${{ inputs.deploy_kitchensink }}" == "true" ]] && echo "false" || echo "true") # disable social login for kitchensink
          export ALLOW_EMAIL_LOGIN=$([[ "${{ inputs.deploy_kitchensink }}" == "true" ]] && echo "true" || echo "false") # enable email login for kitchensink 
          export AWS_REGION="${{ secrets.AWS_REGION }}"
          export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
          export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          if [[ "${{ inputs.deploy_kitchensink }}" != "true" ]]; then
            export OPENID_CLIENT_ID="${{ secrets.OPENID_CLIENT_ID }}"
            export OPENID_CLIENT_SECRET="${{ secrets.OPENID_CLIENT_SECRET }}"
            export OPENID_ISSUER="${{ secrets.OPENID_ISSUER }}"
            export OPENID_SESSION_SECRET="${{ secrets.OPENID_SESSION_SECRET }}"
          fi
          export JWT_SECRET="${{ secrets.JWT_SECRET }}"
          export JWT_REFRESH_SECRET="${{ secrets.JWT_REFRESH_SECRET }}"
          export ANALYTICS_GTM_ID="${{ secrets.ANALYTICS_GTM_ID }}"
          export GUARDRAIL_ID="${{ secrets.GUARDRAIL_ID }}"
          export GUARDRAIL_VERSION="${{ secrets.GUARDRAIL_VERSION }}"

          ENV_FILE_NAME=$([[ "${{ inputs.deploy_kitchensink }}" == "true" ]] && echo "librechat.env" || echo "${{ inputs.environment }}.env")

          envsubst < nj/nj.env.template > "$ENV_FILE_NAME"

          sed 's/=.*$/=***/' "$ENV_FILE_NAME"

      - name: Upload to S3
        run: |
          ENV_FILE_NAME=$([[ "${{ inputs.deploy_kitchensink }}" == "true" ]] && echo "librechat.env" || echo "${{ inputs.environment }}.env")
          aws s3 cp \
            "$ENV_FILE_NAME" \
            "s3://nj-librechat-env-files/$ENV_FILE_NAME"
      
      - name: Redeploy service with new env file
        uses: apideck-libraries/ecs-restart-service@v1
        with:
          service: $([[ "${{ inputs.deploy_kitchensink }}" == "true" ]] && echo "${{ secrets.KITCHENSINK_SERVICE_NAME }}" || echo "${{ secrets.SERVICE_NAME }}")
          cluster: $([[ "${{ inputs.deploy_kitchensink }}" == "true" ]] && echo "${{ secrets.KITCHENSINK_CLUSTER_NAME }}" || echo "${{ secrets.CLUSTER_NAME }}")
