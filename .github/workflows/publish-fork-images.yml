name: Publish Fork Docker Images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Primary image tag to publish
        required: false
        default: latest
        type: string
      build_api:
        description: Also build and push the split API image (Dockerfile.multi)
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  matrix_prep:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Resolve build matrix
        id: set-matrix
        env:
          BUILD_API: ${{ inputs.build_api }}
        run: |
          set -euo pipefail
          matrix='[
            {"target":"node","file":"Dockerfile","image_name":"librechat-dev"}
          ]'
          if [ "$BUILD_API" = "true" ]; then
            matrix='[
              {"target":"node","file":"Dockerfile","image_name":"librechat-dev"},
              {"target":"api-build","file":"Dockerfile.multi","image_name":"librechat-dev-api"}
            ]'
          fi
          {
            echo 'matrix<<EOF'
            printf '%s\n' "$matrix"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  build:
    needs: matrix_prep
    runs-on: ubuntu-latest
    timeout-minutes: 130
    strategy:
      matrix:
        include: ${{ fromJSON(needs.matrix_prep.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare environment
        run: cp .env.example .env

      - name: Compute build metadata
        run: |
          echo "BUILD_COMMIT=${{ github.sha }}" >> "$GITHUB_ENV"
          echo "BUILD_BRANCH=${{ github.ref_name }}" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}:${{ inputs.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}:${{ github.sha }}
          platforms: linux/amd64,linux/arm64
          target: ${{ matrix.target }}
          build-args: |
            BUILD_COMMIT=${{ env.BUILD_COMMIT }}
            BUILD_BRANCH=${{ env.BUILD_BRANCH }}
            BUILD_DATE=${{ env.BUILD_DATE }}

      - name: Make package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_NAME: ${{ matrix.image_name }}
        run: |
          set -euo pipefail
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/user/packages/container/${PACKAGE_NAME}" \
            -f visibility='public'
