name: Build & Push Vermeer Custom Image to ECR

on:
  push:
    branches: ["**"]
    tags: ["*"]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  AWS_ACCOUNT_ID: 897388551593
  AWS_ROLE_NAME: GitHubActions-ECRPush

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag and repo name
        id: vars
        run: |
          # Get repo name from GITHUB_REPOSITORY (owner/repo)
          repo_name="${GITHUB_REPOSITORY##*/}"
          echo "repo_name=$repo_name" >> $GITHUB_OUTPUT

          # Determine tag
          if [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
            if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
              echo "tag=latest" >> $GITHUB_OUTPUT
            else
              safe_branch=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')
              echo "tag=$safe_branch" >> $GITHUB_OUTPUT
            fi
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.AWS_ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names ${{ steps.vars.outputs.repo_name }} || \
          aws ecr create-repository --repository-name ${{ steps.vars.outputs.repo_name }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # -----------------------
      # GitHub App steps end
      # -----------------------

      - name: Build and push image
        env:
          ECR_REGISTRY_URL: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ steps.vars.outputs.repo_name }}
          IMAGE_TAG: ${{ steps.vars.outputs.tag }}
        run: |
          docker build -t $ECR_REGISTRY_URL/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY_URL/$ECR_REPOSITORY:$IMAGE_TAG
