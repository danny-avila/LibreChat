name: Build & Push Vermeer Prod Image

on:
  push:
    tags:
      - 'v*' # build a prod image only on a version tag (e.g. v0.8.5)
  workflow_dispatch: # allow manual rebuilds from the Actions tab

permissions:
  contents: read
  packages: write # required to push to GHCR

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag the image with the version tag (e.g. v0.8.5), a commit-SHA for
      # traceability, and `latest`. On manual dispatch there's no git tag,
      # so only the SHA + `latest` tags are produced.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: node
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
