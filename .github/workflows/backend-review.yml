name: Backend Unit Tests
on:
  pull_request:
    branches:
      - main
      - dev
      - dev-staging
      - release/*
    paths:
      - 'api/**'
      - 'packages/**'

env:
  NODE_ENV: CI
  NODE_OPTIONS: '--max-old-space-size=${{ secrets.NODE_MAX_OLD_SPACE_SIZE || 6144 }}'
  MONGO_URI: ${{ secrets.MONGO_URI }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  CREDS_KEY: ${{ secrets.CREDS_KEY }}
  CREDS_IV: ${{ secrets.CREDS_IV }}
  BAN_VIOLATIONS: ${{ secrets.BAN_VIOLATIONS }}
  BAN_DURATION: ${{ secrets.BAN_DURATION }}
  BAN_INTERVAL: ${{ secrets.BAN_INTERVAL }}

jobs:
  build:
    name: Build packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore build cache
        id: build-cache
        uses: actions/cache@v4
        with:
          path: |
            packages/data-provider/dist
            packages/data-schemas/dist
            packages/api/dist
          key: build-${{ runner.os }}-${{ hashFiles('packages/data-provider/src/**', 'packages/data-schemas/src/**', 'packages/api/src/**', 'packages/data-provider/tsconfig*.json', 'packages/data-schemas/tsconfig*.json', 'packages/api/tsconfig*.json', 'packages/data-provider/rollup.config.js', 'packages/data-schemas/rollup.config.js', 'packages/api/server-rollup.config.js', 'packages/data-provider/package.json', 'packages/data-schemas/package.json', 'packages/api/package.json') }}

      - name: Build packages
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: |
          npm run build:data-provider
          npm run build:data-schemas
          npm run build:api

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-builds
          path: |
            packages/data-provider/dist
            packages/data-schemas/dist
            packages/api/dist
          retention-days: 1

  circular-deps:
    name: Circular dependency checks
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: package-builds

      - name: Detect circular dependencies in @librechat/api build
        run: |
          output=$(npm run build:api 2>&1)
          echo "$output"
          if echo "$output" | grep -q "Circular depend"; then
            echo "Error: Circular dependency detected in @librechat/api!"
            exit 1
          fi

      - name: Detect circular dependencies in rollup
        working-directory: ./packages/data-provider
        run: |
          output=$(npm run rollup:api)
          echo "$output"
          if echo "$output" | grep -q "Circular dependency"; then
            echo "Error: Circular dependency detected!"
            exit 1
          fi

  test-api:
    name: 'Tests: api'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: package-builds

      - name: Create empty auth.json file
        run: |
          mkdir -p api/data
          echo '{}' > api/data/auth.json

      - name: Prepare .env.test file
        run: cp api/test/.env.test.example api/test/.env.test

      - name: Run unit tests
        run: cd api && npm run test:ci

  test-data-provider:
    name: 'Tests: data-provider'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: package-builds

      - name: Run unit tests
        run: cd packages/data-provider && npm run test:ci

  test-data-schemas:
    name: 'Tests: data-schemas'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: package-builds

      - name: Run unit tests
        run: cd packages/data-schemas && npm run test:ci

  test-packages-api:
    name: 'Tests: @librechat/api'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: package-builds

      - name: Run unit tests
        run: cd packages/api && npm run test:ci
