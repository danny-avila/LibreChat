# Keep the SHA-pinned GitHub Actions in OUR fork-specific workflow
# (.github/workflows/build-push-ecr.yml) current. Scoped to github-actions only
# so it does not fight upstream's dependency management on merges.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
