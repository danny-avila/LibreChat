  # === Optional: LiteLLM Proxy for unified local + cloud models ===
  # litellm:
  #   container_name: litellm-proxy
  #   image: ghcr.io/berriai/litellm:main
  #   restart: always
  #   user: "1000:1000"
  #   environment:
  #     - LITELLM_LOG=DEBUG
