extensions:
  headers_setter/tenant_passthrough:
    headers:
      - action: upsert
        key: Authorization
        from_context: authorization

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
        include_metadata: true
        traces_url_path: /api/public/otel/v1/traces

connectors:
  routing/langfuse_tenant_destination:
    error_mode: ignore
    table:
      - context: span
        condition: attributes["librechat.langfuse.destination"] == "eu"
        pipelines: [traces/tenant_eu]
      - context: span
        condition: attributes["librechat.langfuse.destination"] == "us"
        pipelines: [traces/tenant_us]
      - context: span
        condition: attributes["librechat.langfuse.destination"] == "jp"
        pipelines: [traces/tenant_jp]
      - context: span
        condition: attributes["librechat.langfuse.destination"] == "hipaa"
        pipelines: [traces/tenant_hipaa]

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: ${env:LANGFUSE_FANOUT_MEMORY_LIMIT_MIB}
    spike_limit_mib: ${env:LANGFUSE_FANOUT_MEMORY_SPIKE_LIMIT_MIB}
  filter/tenant_export:
    error_mode: ignore
    traces:
      span:
        - attributes["librechat.langfuse.tenant_export.enabled"] != "true"
  attributes/drop_librechat_routing:
    actions:
      - key: librechat.langfuse.tenant_export.enabled
        action: delete
      - key: librechat.langfuse.destination
        action: delete
  batch/central:
    timeout: 1s
    send_batch_size: 128
  batch/by_auth_eu:
    timeout: 1s
    send_batch_size: 128
    metadata_keys: [authorization]
    metadata_cardinality_limit: ${env:LANGFUSE_FANOUT_METADATA_CARDINALITY_LIMIT}
  batch/by_auth_us:
    timeout: 1s
    send_batch_size: 128
    metadata_keys: [authorization]
    metadata_cardinality_limit: ${env:LANGFUSE_FANOUT_METADATA_CARDINALITY_LIMIT}
  batch/by_auth_jp:
    timeout: 1s
    send_batch_size: 128
    metadata_keys: [authorization]
    metadata_cardinality_limit: ${env:LANGFUSE_FANOUT_METADATA_CARDINALITY_LIMIT}
  batch/by_auth_hipaa:
    timeout: 1s
    send_batch_size: 128
    metadata_keys: [authorization]
    metadata_cardinality_limit: ${env:LANGFUSE_FANOUT_METADATA_CARDINALITY_LIMIT}

exporters:
  otlphttp/central:
    # Langfuse Cloud base URL options: https://cloud.langfuse.com (EU),
    # https://us.cloud.langfuse.com (US), https://jp.cloud.langfuse.com (JP),
    # https://hipaa.cloud.langfuse.com (HIPAA).
    endpoint: '${env:LANGFUSE_FANOUT_CENTRAL_BASE_URL}/api/public/otel'
    headers:
      Authorization: '${env:LANGFUSE_FANOUT_CENTRAL_AUTH_HEADER}'
      x-langfuse-ingestion-version: '4'
  otlphttp/tenant_eu:
    endpoint: '${env:LANGFUSE_FANOUT_TENANT_EU_BASE_URL}/api/public/otel'
    auth:
      authenticator: headers_setter/tenant_passthrough
    headers:
      x-langfuse-ingestion-version: '4'
  otlphttp/tenant_us:
    endpoint: '${env:LANGFUSE_FANOUT_TENANT_US_BASE_URL}/api/public/otel'
    auth:
      authenticator: headers_setter/tenant_passthrough
    headers:
      x-langfuse-ingestion-version: '4'
  otlphttp/tenant_jp:
    endpoint: '${env:LANGFUSE_FANOUT_TENANT_JP_BASE_URL}/api/public/otel'
    auth:
      authenticator: headers_setter/tenant_passthrough
    headers:
      x-langfuse-ingestion-version: '4'
  otlphttp/tenant_hipaa:
    endpoint: '${env:LANGFUSE_FANOUT_TENANT_HIPAA_BASE_URL}/api/public/otel'
    auth:
      authenticator: headers_setter/tenant_passthrough
    headers:
      x-langfuse-ingestion-version: '4'

service:
  extensions: [headers_setter/tenant_passthrough]
  pipelines:
    traces/central:
      receivers: [otlp]
      processors: [memory_limiter, attributes/drop_librechat_routing, batch/central]
      exporters: [otlphttp/central]
    traces/tenant:
      receivers: [otlp]
      processors: [memory_limiter, filter/tenant_export]
      exporters: [routing/langfuse_tenant_destination]
    traces/tenant_eu:
      receivers: [routing/langfuse_tenant_destination]
      processors: [attributes/drop_librechat_routing, batch/by_auth_eu]
      exporters: [otlphttp/tenant_eu]
    traces/tenant_us:
      receivers: [routing/langfuse_tenant_destination]
      processors: [attributes/drop_librechat_routing, batch/by_auth_us]
      exporters: [otlphttp/tenant_us]
    traces/tenant_jp:
      receivers: [routing/langfuse_tenant_destination]
      processors: [attributes/drop_librechat_routing, batch/by_auth_jp]
      exporters: [otlphttp/tenant_jp]
    traces/tenant_hipaa:
      receivers: [routing/langfuse_tenant_destination]
      processors: [attributes/drop_librechat_routing, batch/by_auth_hipaa]
      exporters: [otlphttp/tenant_hipaa]
