###############################################################################
# New Jersey LibreChat Config File
#
# Used in conjunction w/ the .env file from BitWarden (because part of
# LibreChat's config still lives in .env, as well as secret API keys).
###############################################################################

# Configuration version (required)
version: 1.3.6

# Cache settings: Set to true to enable caching
cache: true

# We use S3 when deployed, but for local dev, recommend setting `FILE_STRATEGY=local` in .env
fileStrategy: 's3'

# Custom interface configuration
interface:
  customWelcome: 'NJ AI Assistant'

  # Disable temporary chats (we need to retain data for OPRA)
  temporaryChat: false

  # We allow model selection in general, but in the code we filter to only
  # models that we want to allow users to see
  modelSelect: true

  # We're purposefully disabling most LibreChat features (for now)
  agents:
    use: true
    create: false # Can be overridden with env var INTERFACE_AGENTS
    share: true
    public: true
  bookmarks: false
  endpointsMenu: false
  fileCitations: false
  fileSearch: true
  marketplace:
    use: true
  memories: false
  multiConvo: false
  parameters: false
  peoplePicker:
    users: false
    groups: false
    roles: false
  presets: false
  prompts: false
  runCode: false
  sidePanel: false
  webSearch: false
  mcpServers:
    use: true
    create: false
    share: false
    public: false
  remoteAgents:
    use: false
    create: false
    share: false
    public: false

endpoints:
  bedrock:
    availableRegions:
      - 'us-east-1'
    titleModel: 'us.anthropic.claude-sonnet-4-6'
    guardrailConfig:
      guardrailIdentifier: '${GUARDRAIL_ID}'
      guardrailVersion: '${GUARDRAIL_VERSION}'
      trace: 'enabled'
      streamProcessingMode: 'async' # streams responses faster, but may output inappropriate content before the scan completes

  agents:
    capabilities:
      - 'context'
      - 'ocr'
      - 'file_search'

# We explicitly spec our models (since we only have a few models and this makes the selector simpler)
modelSpecs:
  list:
    - name: claude-sonnet-4-6
      label: 'Claude Sonnet 4.6'
      preset:
        endpoint: 'bedrock'
        model: 'us.anthropic.claude-sonnet-4-6'
    - name: 'Claude Sonnet 4.5'
      label: 'Claude Sonnet 4.5'
      default: true
      preset:
        endpoint: 'bedrock'
        model: 'us.anthropic.claude-sonnet-4-5-20250929-v1:0'

ocr:
  strategy: 'document_parser'

fileConfig:
  serverFileSizeLimit: 15 # Global multer limit (MB)
  endpoints:
    default:
      fileLimit: 10
      fileSizeLimit: 15 # mb
      totalSizeLimit: 60 # mb
