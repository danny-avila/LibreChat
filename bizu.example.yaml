# Bizu Chat Configuration
# Copy this file to bizu.yaml and customize as needed
# For more information, see: https://www.bizu.ai/docs/configuration/bizu_yaml

version: 1.2.1

cache: true

# Custom interface — simplified for Bizu
interface:
  customWelcome: 'Bem-vindo ao Bizu! Seu assistente de IA.'
  # Disable features not needed for v1
  agents: false
  presets: false
  prompts: false
  bookmarks: false
  multiConvo: false
  fileSearch: false
  endpointsMenu: false
  sidePanel: true
  modelSelect: true
  parameters: true
  fileCitations: false
  marketplace:
    use: false

  # Privacy & Terms (update URLs when you have real ones)
  privacyPolicy:
    externalUrl: 'https://bizu.chat/privacidade'
    openNewTab: true
  termsOfService:
    externalUrl: 'https://bizu.chat/termos'
    openNewTab: true
    modalAcceptance: true
    modalTitle: 'Termos de Uso do Bizu'
    modalContent: |
      # Termos de Uso do Bizu

      *Data de vigência: Março de 2026*

      Bem-vindo ao Bizu, sua plataforma de assistente de IA. Ao utilizar nossos serviços, você concorda com estes termos.

      ## 1. Uso do Serviço
      O Bizu é uma plataforma de chat com inteligência artificial. Você se compromete a usar o serviço de forma ética e legal.

      ## 2. Dados do Usuário
      Coletamos informações necessárias para fornecer o serviço, como nome, e-mail e dados de uso. Consulte nossa Política de Privacidade para mais detalhes.

      ## 3. Limitações
      O Bizu utiliza modelos de IA que podem gerar respostas imprecisas. Não nos responsabilizamos pelo conteúdo gerado pela IA.

      ## 4. Alterações
      Reservamo-nos o direito de modificar estes termos a qualquer momento, notificando os usuários por e-mail.

      Ao usar o Bizu, você reconhece que leu e concorda com estes Termos de Uso.

balance:
  enabled: true
  startBalance: 100000
  autoRefillEnabled: true
  refillIntervalValue: 30
  refillIntervalUnit: 'days'
  refillAmount: 100000
  # Cap total auto-refills per user (0 = unlimited). Set before Stripe integration.
  maxRefillCount: 3

registration:
  socialLogins: []

# Model specs — show actual model display names so users know exactly which model they're using.
# Never rename models with brand names; use the real model name as the label.
modelSpecs:
  enforce: true
  prioritize: true
  list:
    # DeepSeek V3 — fast general-purpose chat model
    - name: 'deepseek-v3'
      label: 'DeepSeek V3 0324'
      description: 'Rápido e versátil — ideal para conversas do dia a dia'
      default: true
      preset:
        endpoint: 'OpenRouter'
        model: 'deepseek/deepseek-chat-v3-0324'

    # DeepSeek R1 — deep reasoning model
    - name: 'deepseek-r1'
      label: 'DeepSeek R1'
      description: 'Raciocínio profundo para tarefas complexas'
      preset:
        endpoint: 'OpenRouter'
        model: 'deepseek/deepseek-r1'

    # DeepSeek R1 (0528) — latest R1 with improved reasoning
    - name: 'deepseek-r1-0528'
      label: 'DeepSeek R1 0528'
      description: 'Versão mais recente com raciocínio aprimorado'
      preset:
        endpoint: 'OpenRouter'
        model: 'deepseek/deepseek-r1-0528'

    # Qwen3 235B — large-parameter model for maximum capability
    - name: 'qwen3-235b'
      label: 'Qwen3 235B'
      description: 'Máxima capacidade para desafios exigentes'
      preset:
        endpoint: 'OpenRouter'
        model: 'qwen/qwen3-235b-a22b'

    # Qwen3 30B — compact and efficient for fast responses
    - name: 'qwen3-30b'
      label: 'Qwen3 30B'
      description: 'Compacto e eficiente — respostas ágeis'
      preset:
        endpoint: 'OpenRouter'
        model: 'qwen/qwen3-30b-a3b'

# DeepSeek models via OpenRouter
endpoints:
  custom:
    - name: 'OpenRouter'
      apiKey: '${OPENROUTER_KEY}'
      baseURL: 'https://openrouter.ai/api/v1'
      models:
        default:
          - 'deepseek/deepseek-chat-v3-0324'
          - 'deepseek/deepseek-r1'
          - 'deepseek/deepseek-r1-0528'
          - 'qwen/qwen3-235b-a22b'
          - 'qwen/qwen3-30b-a3b'
        fetch: false
      titleConvo: true
      titleModel: 'deepseek/deepseek-chat-v3-0324'
      dropParams: ['stop']
