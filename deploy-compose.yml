services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: librechat-api
    container_name: LibreChat-API
    ports:
      - 3080:3080
    depends_on:
      - mongodb
      - rag_api
    restart: always
    extra_hosts:
    - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/LibreChat
      - MEILI_HOST=http://meilisearch:7700
      - RAG_PORT=${RAG_PORT:-8000}
      - RAG_API_URL=http://rag_api:${RAG_PORT:-8000}
    volumes:
      - type: bind
        source: ./librechat.yaml
        target: /app/librechat.yaml
      - ./images:/app/client/public/images
      - ./uploads:/app/uploads
      - ./logs:/app/api/logs

  client:
    image: nginx:1.27.0-alpine
    container_name: LibreChat-NGINX
    ports:
      - 80:80
      - 443:443
    depends_on:
      - api
    restart: always
    volumes:
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf
  mongodb:
    container_name: chat-mongodb
    # ports:  # Uncomment this to access mongodb from outside docker, not safe in deployment
    #   - 27018:27017
    image: mongo:8.0.20
    restart: always
    volumes:
      - ./data-node:/data/db
    command: mongod --noauth
  meilisearch:
    container_name: chat-meilisearch
    image: getmeili/meilisearch:v1.35.1
    restart: always
    # ports: # Uncomment this to access meilisearch from outside docker
    #   - 7700:7700 # if exposing these ports, make sure your master key is not the default value
    env_file:
      - .env
    environment:
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_NO_ANALYTICS=true
    volumes:
      - ./meili_data_v1.35.1:/meili_data
  vectordb:
    image: pgvector/pgvector:0.8.0-pg15-trixie
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    restart: always
    volumes:
      - pgdata2:/var/lib/postgresql/data
  rag_api:
    image: registry.librechat.ai/danny-avila/librechat-rag-api-dev-lite:latest
    environment:
      - DB_HOST=vectordb
      - RAG_PORT=${RAG_PORT:-8000}
    restart: always
    depends_on:
      - vectordb
    env_file:
      - .env

  # Self-hosted Code Interpreter — backs the agents `execute_code` capability.
  # Implements LibreChat's Code Interpreter API (base path /v1/librechat) and is
  # version-matched to LibreChat v0.8.6. Generated files (xlsx/docx/pdf/pptx) are
  # returned to LibreChat's processCodeOutput pipeline as downloadable attachments.
  # Point the api at it via .env: LIBRECHAT_CODE_BASEURL + LIBRECHAT_CODE_API_KEY.
  code-interpreter:
    image: ghcr.io/martvaha/code-interpreter:latest
    container_name: LibreChat-CodeInterpreter
    restart: always
    environment:
      # HOST_PATH lets the interpreter bind-mount the correct host directory into
      # the sandbox containers it spawns. Must be the compose project directory.
      - HOST_PATH=${PWD}
    volumes:
      - ./uploads:/app/uploads
      # Sandbox execution spawns sibling containers via the host Docker daemon.
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  pgdata2:
