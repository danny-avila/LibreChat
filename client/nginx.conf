# HTTP-only — Caddy handles SSL termination in front of this container

server {
    listen 80;
    listen [::]:80;
    server_name vibe.inboundfound.com;

    # https://docs.nginx.com/nginx/admin-guide/web-server/compression/
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/css application/javascript application/json application/octet-stream;

    # Increase the client_max_body_size to allow larger file uploads
    # The default limits for image uploads as of 11/22/23 is 20MB/file, and 25MB/request
    client_max_body_size 25M;

    # Timeout configurations
    proxy_connect_timeout 120s;
    proxy_send_timeout 960s;
    proxy_read_timeout 960s;
    send_timeout 960s;
    client_body_timeout 120s;
    client_header_timeout 120s;

    # Content Security Policy headers for sandpack/code artifacts
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob:; frame-src 'self' https://*.codesandbox.io https://codesandbox.io https://*.marker.io https://marker.io; connect-src 'self' https://*.codesandbox.io https://codesandbox.io wss://*.codesandbox.io https://api.marker.io https://contentrecommender-crawler-dev-crawlartifacts-rw7fuvdr0p9d.s3.us-east-1.amazonaws.com https://*.marker.io wss://*.marker.io;" always;

    location /api/ {
        proxy_pass http://api:3080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://api:3080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
