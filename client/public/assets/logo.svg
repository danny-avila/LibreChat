<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C6478"/>
      <stop offset="100%" stop-color="#083D4E"/>
    </linearGradient>
    <linearGradient id="star-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C84A"/>
      <stop offset="100%" stop-color="#C9A01E"/>
    </linearGradient>
    <linearGradient id="star-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2D76A"/>
      <stop offset="100%" stop-color="#B8891A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="star-glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="rounded-clip">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg-grad)"/>

  <!-- Subtle inner border for depth -->
  <rect x="6" y="6" width="500" height="500" rx="92" ry="92" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- Moroccan geometric ring (outer decorative circle) -->
  <circle cx="256" cy="228" r="178" fill="none" stroke="rgba(201,160,30,0.18)" stroke-width="1.5"/>
  <circle cx="256" cy="228" r="155" fill="none" stroke="rgba(201,160,30,0.12)" stroke-width="1"/>

  <!-- 8-pointed star (Moroccan zellige / khatam style) -->
  <!-- Outer R=140, inner r=58, centered at (256, 228) -->
  <path
    d="M256,88 L278,174 L355,129 L310,206 L396,228 L310,250 L355,327 L278,282 L256,368 L234,282 L157,327 L202,250 L116,228 L202,206 L157,129 L234,174 Z"
    fill="url(#star-shine)"
    filter="url(#star-glow)"
    opacity="0.96"
  />

  <!-- Star inner highlight overlay for dimension -->
  <path
    d="M256,88 L278,174 L355,129 L310,206 L396,228 L310,250 L355,327 L278,282 L256,368 L234,282 L157,327 L202,250 L116,228 L202,206 L157,129 L234,174 Z"
    fill="none"
    stroke="rgba(255,240,160,0.3)"
    stroke-width="1.5"
  />

  <!-- Center medallion -->
  <circle cx="256" cy="228" r="36" fill="#083D4E" opacity="0.85"/>
  <circle cx="256" cy="228" r="30" fill="none" stroke="rgba(201,160,30,0.5)" stroke-width="1.5"/>

  <!-- Small 4-pointed star in center -->
  <path
    d="M256,210 L261,222 L274,228 L261,234 L256,246 L251,234 L238,228 L251,222 Z"
    fill="#C9A01E"
    opacity="0.9"
  />

  <!-- Atlas Mountains silhouette at bottom -->
  <g clip-path="url(#rounded-clip)">
    <path
      d="M0,470 L45,432 L92,385 L132,412 L178,358 L210,388 L256,342 L302,382 L338,352 L382,390 L422,370 L468,415 L512,438 L512,512 L0,512 Z"
      fill="rgba(255,255,255,0.09)"
    />
    <!-- Second mountain layer for depth -->
    <path
      d="M0,490 L60,460 L105,440 L150,455 L195,430 L240,448 L256,420 L272,445 L315,428 L360,452 L410,438 L460,458 L512,448 L512,512 L0,512 Z"
      fill="rgba(255,255,255,0.06)"
    />
  </g>

  <!-- Subtle geometric corner dots (Moroccan tile motif) -->
  <circle cx="96" cy="96" r="3" fill="rgba(201,160,30,0.35)"/>
  <circle cx="416" cy="96" r="3" fill="rgba(201,160,30,0.35)"/>
  <circle cx="96" cy="416" r="3" fill="rgba(201,160,30,0.35)"/>
  <circle cx="416" cy="416" r="3" fill="rgba(201,160,30,0.35)"/>
</svg>