# Do not edit this file directly. Use a ‘docker-compose.override.yaml’ file if you can.
# Refer to `docker-compose.override.yaml.example’ for some sample configurations.

services:
  api:
    container_name: LibreChat
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      - mongodb
      - rag_api
    image: librechat-smb:latest
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HOST=0.0.0.0
      - MONGO_URI=mongodb://mongodb:27017/LibreChat
      - MEILI_HOST=http://meilisearch:7700
      - RAG_PORT=${RAG_PORT:-8000}
      - RAG_API_URL=http://rag_api:${RAG_PORT:-8000}
      - LIBRECHAT_CODE_BASEURL=${LIBRECHAT_CODE_BASEURL}
      - LIBRECHAT_CODE_API_KEY=${LIBRECHAT_CODE_API_KEY}
    volumes:
      - type: bind
        source: ./.env
        target: /app/.env
      - type: bind
        source: ./librechat.yaml
        target: /app/librechat.yaml
      - ./images:/app/client/public/images
      - ./uploads:/app/uploads
      - ./logs:/app/logs
  mongodb:
    container_name: chat-mongodb
    image: mongo:8.0.20
    restart: always
    user: "${UID}:${GID}"
    volumes:
      - ./data-node:/data/db
    command: mongod --noauth
  meilisearch:
    container_name: chat-meilisearch
    image: getmeili/meilisearch:v1.35.1
    restart: always
    user: "${UID}:${GID}"
    environment:
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
    volumes:
      - ./meili_data_v1.35.1:/meili_data
  vectordb:
    container_name: vectordb
    image: pgvector/pgvector:0.8.0-pg15-trixie
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    restart: always
    volumes:
      - pgdata2:/var/lib/postgresql/data
  rag_api:
    container_name: rag_api
    image: registry.librechat.ai/danny-avila/librechat-rag-api-dev-lite:latest
    environment:
      - DB_HOST=vectordb
      - RAG_PORT=${RAG_PORT:-8000}
    restart: always
    depends_on:
      - vectordb
    env_file:
      - .env

  # Self-hosted Code Interpreter — backs the agents `execute_code` capability.
  # Implements LibreChat's Code Interpreter API (base path /v1/librechat), version
  # matched to LibreChat v0.8.6. Generated files (xlsx/docx/pdf/pptx) flow back
  # through processCodeOutput as downloadable attachments. The api reaches it at
  # http://code-interpreter:8000/v1/librechat via LIBRECHAT_CODE_BASEURL in .env.
  code-interpreter:
    container_name: LibreChat-CodeInterpreter
    image: ghcr.io/martvaha/code-interpreter:latest
    restart: always
    environment:
      # Lets the interpreter bind-mount the correct host dir into the sandbox
      # containers it spawns. Must be the compose project directory.
      - HOST_PATH=${PWD}
      # Python execution image for spawned sandbox containers. Defaults to our
      # custom image (built by the `sandbox-python` service below) which adds
      # openpyxl/python-docx/python-pptx/reportlab/fpdf2 on top of scipy-notebook.
      # Override in .env to use the stock image (jupyter/scipy-notebook:latest).
      - PY_CONTAINER_IMAGE=${PY_CONTAINER_IMAGE:-aiworkforce/py-sandbox:latest}
    volumes:
      - ./uploads:/app/uploads
      # Sandbox execution spawns sibling containers via the host Docker daemon.
      - /var/run/docker.sock:/var/run/docker.sock

  # Build-only helper: produces the custom Python sandbox image on the Docker
  # host so the code-interpreter's sibling-container spawns can find it by tag.
  # It never runs as a long-lived service (build profile). Build it with:
  #   docker compose build sandbox-python
  sandbox-python:
    build:
      context: ./sandbox
    image: aiworkforce/py-sandbox:latest
    profiles:
      - build
    restart: "no"
    command: ["true"]

volumes:
  pgdata2:
